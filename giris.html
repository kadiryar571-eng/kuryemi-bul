<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş / Kayıt · KuryemiBul</title>
  <meta name="description" content="KuryemiBul'a giriş yap veya yeni hesap oluştur.">
  <link rel="icon" href="assets/logo.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="stylesheet" href="assets/css/main.css?v=2">
</head>
<body class="auth-page">

  <!-- Header -->
  <header class="auth-header">
    <a class="brand" href="index.html">KuryemiBul</a>
    <div class="header-spacer"></div>
    <div class="header-links" id="header-hint">
      Hesabın yok mu? <a href="#" id="switch-to-register">Kayıt ol</a>
    </div>
  </header>

  <!-- Body -->
  <main class="auth-body">
    <div class="auth-box">

      <!-- Sekmeler -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" type="button">Giriş Yap</button>
        <button class="auth-tab" id="tab-register" type="button">Kayıt Ol</button>
      </div>

      <!-- Hata / Başarı mesajı -->
      <div id="auth-alert" style="display:none" class="alert alert--error mb-16" role="alert"></div>

      <!-- Google ile giriş -->
      <button class="btn btn--social" id="google-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.4 33.4 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 2.9l6-6C34.6 5.9 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.2-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 6 1.1 8.2 2.9l6-6C34.6 5.9 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#FBBC04" d="M24 44c5.6 0 10.5-1.9 14.4-5.1l-6.7-5.5C29.8 35.1 27 36 24 36c-5.7 0-10.6-3.6-12.3-8.7l-7 5.4C8.2 39.5 15.5 44 24 44z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.7 2.3-2.1 4.2-3.9 5.6l6.7 5.5C42.8 36 44.7 30.5 44.7 24c0-1.3-.1-2.7-.2-4z"/></svg>
        Google ile devam et
      </button>

      <div class="auth-divider">veya</div>

      <!-- GİRİŞ FORMU -->
      <form id="login-form" class="form-group" novalidate>
        <div class="field">
          <label for="login-email">E-posta adresi</label>
          <input type="email" id="login-email" name="email" placeholder="ornek@mail.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="login-password">Şifre</label>
          <div class="input-group">
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" data-target="login-password" aria-label="Şifreyi göster">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div style="text-align:right">
          <a href="sifre-sifirla.html" class="text-sm" style="color:var(--text-2)">Şifremi unuttum</a>
        </div>
        <button type="submit" class="btn btn--primary btn--block btn--lg" id="login-btn">Giriş Yap</button>
      </form>

      <!-- KAYIT FORMU -->
      <form id="register-form" class="form-group" novalidate style="display:none">
        <div class="field">
          <label for="reg-name">Ad Soyad</label>
          <input type="text" id="reg-name" name="ad" placeholder="Ali Yılmaz" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="reg-email">E-posta adresi</label>
          <input type="email" id="reg-email" name="email" placeholder="ornek@mail.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="reg-phone">Telefon <span class="text-faint text-sm">(opsiyonel)</span></label>
          <input type="tel" id="reg-phone" name="telefon" placeholder="05xx xxx xx xx" autocomplete="tel">
        </div>
        <div class="field">
          <label for="reg-password">Şifre</label>
          <div class="input-group">
            <input type="password" id="reg-password" name="password" placeholder="En az 6 karakter" autocomplete="new-password" required minlength="6">
            <button type="button" class="toggle-pw" data-target="reg-password" aria-label="Şifreyi göster">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <label class="check-label text-sm">
          <input type="checkbox" id="reg-agree" required>
          <span><a href="kvkk.html" target="_blank">Gizlilik Politikası</a> ve <a href="sartlar.html" target="_blank">Kullanım Şartlarını</a> kabul ediyorum</span>
        </label>
        <button type="submit" class="btn btn--primary btn--block btn--lg" id="register-btn">Hesap Oluştur</button>
      </form>

      <p class="auth-footer" id="auth-footer-text">
        Henüz hesabın yok mu? <a href="#" id="footer-switch">Kayıt ol →</a>
      </p>

    </div>
  </main>

  <!-- Scripts -->
  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
  (function () {
    'use strict';

    /* ─── Tab geçişi ─────────────────────────────────────────── */
    var loginForm    = document.getElementById('login-form');
    var registerForm = document.getElementById('register-form');
    var tabLogin     = document.getElementById('tab-login');
    var tabReg       = document.getElementById('tab-register');
    var headerHint   = document.getElementById('header-hint');
    var footerText   = document.getElementById('auth-footer-text');

    function showLogin() {
      loginForm.style.display    = '';
      registerForm.style.display = 'none';
      tabLogin.classList.add('active');
      tabReg.classList.remove('active');
      headerHint.innerHTML = 'Hesabın yok mu? <a href="#" id="switch-to-register">Kayıt ol</a>';
      footerText.innerHTML = 'Henüz hesabın yok mu? <a href="#" id="footer-switch">Kayıt ol →</a>';
      bindSwitchLinks();
      clearAlert();
    }
    function showRegister() {
      loginForm.style.display    = 'none';
      registerForm.style.display = '';
      tabLogin.classList.remove('active');
      tabReg.classList.add('active');
      headerHint.innerHTML = 'Zaten hesabın var mı? <a href="#" id="switch-to-login">Giriş yap</a>';
      footerText.innerHTML = 'Zaten hesabın var mı? <a href="#" id="footer-switch">Giriş yap →</a>';
      bindSwitchLinks();
      clearAlert();
    }
    function bindSwitchLinks() {
      var toReg   = document.getElementById('switch-to-register');
      var toLogin = document.getElementById('switch-to-login');
      var fSwitch = document.getElementById('footer-switch');
      if (toReg)   toReg.addEventListener('click',   function (e) { e.preventDefault(); showRegister(); });
      if (toLogin) toLogin.addEventListener('click',  function (e) { e.preventDefault(); showLogin(); });
      if (fSwitch) fSwitch.addEventListener('click',  function (e) { e.preventDefault(); loginForm.style.display !== 'none' ? showRegister() : showLogin(); });
    }
    tabLogin.addEventListener('click', showLogin);
    tabReg.addEventListener('click', showRegister);
    bindSwitchLinks();

    /* URL'de ?mode=register varsa kayıt sekmesini aç */
    if (new URLSearchParams(location.search).get('mode') === 'register') showRegister();

    /* ─── Şifre göster/gizle ─────────────────────────────────── */
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.toggle-pw');
      if (!btn) return;
      var inp = document.getElementById(btn.getAttribute('data-target'));
      if (!inp) return;
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    /* ─── Alert ──────────────────────────────────────────────── */
    var alertEl = document.getElementById('auth-alert');
    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = 'alert alert--' + (type || 'error') + ' mb-16';
      alertEl.style.display = '';
    }
    function clearAlert() { alertEl.style.display = 'none'; alertEl.textContent = ''; }

    /* ─── Giriş sonrası yönlendirme ─────────────────────────── */
    function afterAuth(profile) {
      var role = profile && profile.role;
      if (!role) { location.href = 'onboarding.html'; return; }
      if (window.KB && KB.roleToPanel) { location.href = KB.roleToPanel(role); }
      else { location.href = 'panel-' + role + '.html'; }
    }

    /* ─── Supabase hazır mı bekle ────────────────────────────── */
    async function waitSB() {
      if (window.SB && SB.isOn()) return true;
      return false;
    }

    /* ─── Google OAuth ───────────────────────────────────────── */
    document.getElementById('google-btn').addEventListener('click', async function () {
      if (!await waitSB()) { showAlert('Bağlantı yok — lütfen sayfayı yenile.'); return; }
      var btn = this;
      btn.disabled = true; btn.textContent = 'Yükleniyor…';
      try { await SB.signInWithGoogle(); }
      catch (e) { showAlert(e.message || 'Bir hata oluştu.'); btn.disabled = false; btn.textContent = 'Google ile devam et'; }
    });

    /* ─── Giriş formu ────────────────────────────────────────── */
    loginForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearAlert();
      var email = document.getElementById('login-email').value.trim();
      var pw    = document.getElementById('login-password').value;
      if (!email || !pw) { showAlert('E-posta ve şifre gereklidir.'); return; }

      var btn = document.getElementById('login-btn');
      btn.classList.add('is-loading'); btn.disabled = true;

      try {
        if (!await waitSB()) throw new Error('Sunucuya bağlanılamadı.');
        var res = await SB.signIn(email, pw);
        if (res && res.error) throw res.error;
        var profile = await SB.myProfile();
        afterAuth(profile);
      } catch (err) {
        var msg = err && err.message;
        if (msg && (msg.includes('Invalid') || msg.includes('credentials') || msg.includes('password'))) msg = 'E-posta veya şifre hatalı.';
        else if (msg && msg.includes('Email not confirmed')) msg = 'E-posta adresinizi doğrulamadınız. Gelen kutunuzu kontrol edin.';
        showAlert(msg || 'Giriş yapılamadı.');
        btn.classList.remove('is-loading'); btn.disabled = false;
      }
    });

    /* ─── Kayıt formu ────────────────────────────────────────── */
    registerForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearAlert();
      var ad      = document.getElementById('reg-name').value.trim();
      var email   = document.getElementById('reg-email').value.trim();
      var tel     = document.getElementById('reg-phone').value.trim();
      var pw      = document.getElementById('reg-password').value;
      var agreed  = document.getElementById('reg-agree').checked;

      if (!ad)     { showAlert('Ad Soyad gereklidir.'); return; }
      if (!email)  { showAlert('E-posta gereklidir.'); return; }
      if (pw.length < 6) { showAlert('Şifre en az 6 karakter olmalıdır.'); return; }
      if (!agreed) { showAlert('Devam etmek için şartları kabul etmelisiniz.'); return; }

      var btn = document.getElementById('register-btn');
      btn.classList.add('is-loading'); btn.disabled = true;

      try {
        if (!await waitSB()) throw new Error('Sunucuya bağlanılamadı.');
        var res = await SB.signUp(email, pw, ad, tel);
        if (res && res.error) throw res.error;
        location.href = 'verify-email.html?email=' + encodeURIComponent(email);
      } catch (err) {
        var msg = err && err.message;
        if (msg && msg.includes('already registered')) msg = 'Bu e-posta adresi zaten kayıtlı.';
        showAlert(msg || 'Kayıt olunamadı.');
        btn.classList.remove('is-loading'); btn.disabled = false;
      }
    });

    /* ─── OAuth callback (sayfa yüklenince) ─────────────────── */
    (async function checkCallback() {
      if (!window.SB || !SB.isOn()) return;
      try {
        var user = await SB.getUser();
        if (user) {
          var profile = await SB.myProfile();
          afterAuth(profile);
        }
      } catch (e) {}
    })();

  }());
  </script>
</body>
</html>
