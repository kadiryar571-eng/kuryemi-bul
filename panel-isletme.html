<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p class="page-sub">İlanlarını ve başvuruları buradan yönet.</p>
    </div>

    <!-- Tab nav -->
    <nav class="dash__nav">
      <button data-tab="ana">Genel Bakış</button>
      <button data-tab="ilanlar">İlanlarım</button>
      <button data-tab="basvurular">Teklifler</button>
    </nav>

    <!-- Genel Bakış -->
    <div class="dash__panel" id="panel-ana">
      <div class="panel-box mb-16">
        <div class="panel-box__head">
          <h3>Metrikler</h3>
          <a href="profil-duzenle.html" class="btn btn--ghost btn--sm">Profili Düzenle</a>
        </div>
        <div class="panel-box__body">
          <div id="isletmeMetrics">
            <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:60%"></span></span></div></div>
          </div>
        </div>
      </div>
      <div class="panel-box">
        <div class="panel-box__head"><h3>Hızlı Erişim</h3></div>
        <div class="panel-box__body" style="display:flex;flex-wrap:wrap;gap:10px">
          <a href="kuryeler.html" class="btn btn--primary">Kurye Bul</a>
          <a href="ilanlar.html" class="btn btn--secondary">İlanlar</a>
          <a href="mesajlar.html" class="btn btn--ghost">Mesajlar</a>
          <a href="profil-duzenle.html" class="btn btn--ghost">Profili Düzenle</a>
        </div>
      </div>
    </div>

    <!-- İlanlarım -->
    <div class="dash__panel" id="panel-ilanlar">
      <div class="panel-box">
        <div class="panel-box__head">
          <h3>İlanlarım</h3>
        </div>
        <div class="panel-box__body">
          <div id="isletmeIlan">
            <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:70%"></span></span></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Teklifler -->
    <div class="dash__panel" id="panel-basvurular">
      <div class="panel-box">
        <div class="panel-box__head"><h3>Teklifler</h3></div>
        <div class="panel-box__body">
          <div id="isletmeBasvuru">
            <div class="empty">Henüz teklif yok.</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /.app-content -->

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.KBApp && KBApp.initPanel) KBApp.initPanel('isletme');
    });
  </script>
</body>
</html>
