<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eşleşmelerim · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Eşleşmelerim</h1>
      <p class="page-sub">Karşılıklı kabul edilmiş teklifler ve aktif bağlantılar.</p>
    </div>

    <div id="eslesmeRoot">
      <div class="skel-card"><span class="skel skel--line" style="width:70%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></div>
      <div class="skel-card" style="margin-top:12px"><span class="skel skel--line" style="width:65%"></span><span class="skel skel--line" style="width:35%;margin-top:8px"></span></div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (!window.KB) return;
      await KB.ready();
      var host = document.getElementById('eslesmeRoot');
      if (!host) return;
      if (!window.SB || !SB.isOn() || !(KB.isAuthed && KB.isAuthed())) {
        host.innerHTML = '<div class="kb-empty"><div class="kb-empty__ic">🤝</div><div class="kb-empty__t">Giriş yapmalısınız</div><a class="btn btn--primary btn--sm mt-24" href="giris.html">Giriş Yap</a></div>';
        return;
      }
      try {
        var matches = SB.myMatches ? await SB.myMatches() : [];
        if (!matches || !matches.length) {
          host.innerHTML = '<div class="kb-empty"><div class="kb-empty__ic">🤝</div><div class="kb-empty__t">Henüz eşleşme yok</div><p style="color:var(--text-2);font-size:0.85rem;margin-top:6px">Teklifler kabul edildiğinde burada görünür.</p><a class="btn btn--primary btn--sm mt-24" href="kuryeler.html">Havuzu Keşfet</a></div>';
          return;
        }
        host.innerHTML = '<div class="cards-grid">' + matches.map(function(m) {
          var page = m.role === 'kurye' ? 'profil-kurye.html' : m.role === 'isletme' ? 'profil-isletme.html' : 'profil-firma.html';
          return '<div class="pcard"><div class="pcard__top"><div class="avatar">' + (window.KB ? KB.initials(m.ad || '?') : '?') + '</div>' +
            '<div class="pcard__info"><div class="pcard__name">' + (m.ad || '') + '</div><div class="pcard__sub">' + (m.sehir || '') + '</div></div></div>' +
            '<div class="pcard__foot"><a class="btn btn--primary btn--sm" href="mesajlar.html?to=' + m.id + '">Mesaj Gönder</a>' +
            '<a class="btn btn--ghost btn--sm" href="' + page + '?id=' + m.id + '">Profil</a></div></div>';
        }).join('') + '</div>';
      } catch (e) {
        host.innerHTML = '<div class="kb-empty"><div class="kb-empty__ic">⚠️</div><div class="kb-empty__t">Eşleşmeler yüklenemedi</div></div>';
      }
    });
  </script>
</body>
</html>
