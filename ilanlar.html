<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title data-i18n="title.ilanlar">İlanlar · Kuryemi Bul</title>
    <meta name="description" content="Açık kurye ilanlarını keşfet ve başvur. Kuryemi Bul ilan havuzu.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="İlanlar · Kuryemi Bul">
    <meta property="og:description" content="Açık kurye ilanlarını keşfet ve başvur.">
    <meta property="og:url" content="https://kuryemibul.com/ilanlar.html">
    <meta property="og:image" content="https://kuryemibul.com/assets/og-cover.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/mobile-design-system.css">
    <link rel="stylesheet" href="assets/css/mobile-screens.css">
    <link rel="stylesheet" href="assets/css/mobile-motion.css">
    <link rel="stylesheet" href="assets/css/space-bg.css">
</head>
<body>
    <div id="app-header"></div>

    <section class="kb-hero">
        <div class="container">
            <span class="kb-hero__eyebrow">Kariyer Fırsatları</span>
            <h1 class="kb-hero__title">Sana uygun fırsatları keşfet</h1>
            <p class="kb-hero__sub">En uygun kurye pozisyonlarını bul, tek tıkla başvur.</p>
            <div class="kb-hero__meta">
                <span class="kb-hero__meta-item">Akıllı eşleşme</span>
                <span class="kb-hero__meta-item">Premium işverenler</span>
                <span class="kb-hero__meta-item">Kariyer gelişimi</span>
            </div>
        </div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="toolbar">
                <div class="search search--suggest">
                    <input type="search" id="jobSearch" autocomplete="off" data-i18n-ph="ilan.search" placeholder="Pozisyon, işveren, şehir veya bölge ara…" aria-label="Ara">
                    <div class="suggest" id="jobSuggest" role="listbox"></div>
                </div>
                <!-- Desktop filtreler — mobilde gizlenir -->
                <div class="filter-selects">
                    <select id="jobCity" aria-label="Şehir"></select>
                    <select id="jobVehicle" aria-label="Araç"></select>
                    <select id="jobSort" class="toolbar__sort" aria-label="Sırala">
                        <option value="new" data-i18n="ilan.sortNew">En yeni</option>
                        <option value="old" data-i18n="ilan.sortOld">En eski</option>
                        <option value="match" data-i18n="ilan.sortMatch">Uyuma göre</option>
                    </select>
                </div>
                <!-- Mobil filtre butonu — desktop'ta gizlenir -->
                <button class="toolbar__filter-btn" id="filterSheetBtn" aria-haspopup="dialog" aria-expanded="false" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
                    Filtrele
                    <span class="toolbar__filter-badge" id="filterBadge" style="display:none">0</span>
                </button>
            </div>
            <div class="active-chips" id="jobChips"></div>
            <p class="result-count" id="listingsCount"></p>
            <div class="talent-grid" id="listingsGrid"></div>
        </div>
    </main>

    <!-- Bottom sheet filtre (mobil) -->
    <div class="kb-bottom-sheet-overlay" id="filterOverlay"></div>
    <div class="kb-bottom-sheet kb-filter-sheet" id="filterSheet" role="dialog" aria-modal="true" aria-label="Filtreler">
        <span class="kb-bottom-sheet__handle"></span>
        <div class="kb-bottom-sheet__head">
            <span class="kb-bottom-sheet__title">Filtreler</span>
            <button class="kb-bottom-sheet__close" id="filterSheetClose" aria-label="Kapat">✕</button>
        </div>
        <div class="kb-bottom-sheet__body">
            <div>
                <label for="jobCityMob">Şehir</label>
                <select id="jobCityMob" aria-label="Şehir (mobil)"></select>
            </div>
            <div>
                <label for="jobVehicleMob">Araç Tipi</label>
                <select id="jobVehicleMob" aria-label="Araç (mobil)"></select>
            </div>
            <div>
                <label for="jobSortMob">Sıralama</label>
                <select id="jobSortMob" aria-label="Sırala (mobil)">
                    <option value="new">En yeni</option>
                    <option value="old">En eski</option>
                    <option value="match">Uyuma göre</option>
                </select>
            </div>
            <button class="kb-filter-sheet__apply" id="filterSheetApply">Uygula</button>
        </div>
    </div>

    <script>
    (function () {
        var btn     = document.getElementById("filterSheetBtn");
        var sheet   = document.getElementById("filterSheet");
        var overlay = document.getElementById("filterOverlay");
        var closeBtn = document.getElementById("filterSheetClose");
        var applyBtn = document.getElementById("filterSheetApply");

        function openSheet() {
            sheet.classList.add("is-open");
            overlay.classList.add("is-open");
            btn.setAttribute("aria-expanded", "true");
            // Mobil select'leri desktop select'lerle senkronize et
            var cityDt  = document.getElementById("jobCity");
            var vehDt   = document.getElementById("jobVehicle");
            var sortDt  = document.getElementById("jobSort");
            var cityMob = document.getElementById("jobCityMob");
            var vehMob  = document.getElementById("jobVehicleMob");
            var sortMob = document.getElementById("jobSortMob");
            if (cityDt && cityMob) { cityMob.innerHTML = cityDt.innerHTML; cityMob.value = cityDt.value; }
            if (vehDt  && vehMob)  { vehMob.innerHTML  = vehDt.innerHTML;  vehMob.value  = vehDt.value;  }
            if (sortDt && sortMob) { sortMob.value = sortDt.value; }
        }
        function closeSheet() {
            sheet.classList.remove("is-open");
            overlay.classList.remove("is-open");
            btn.setAttribute("aria-expanded", "false");
        }
        function applyFilters() {
            var cityDt  = document.getElementById("jobCity");
            var vehDt   = document.getElementById("jobVehicle");
            var sortDt  = document.getElementById("jobSort");
            var cityMob = document.getElementById("jobCityMob");
            var vehMob  = document.getElementById("jobVehicleMob");
            var sortMob = document.getElementById("jobSortMob");
            if (cityDt && cityMob) { cityDt.value = cityMob.value; cityDt.dispatchEvent(new Event("change")); }
            if (vehDt  && vehMob)  { vehDt.value  = vehMob.value;  vehDt.dispatchEvent(new Event("change"));  }
            if (sortDt && sortMob) { sortDt.value  = sortMob.value; sortDt.dispatchEvent(new Event("change")); }
            updateFilterBadge();
            closeSheet();
        }
        function updateFilterBadge() {
            var cityDt = document.getElementById("jobCity");
            var vehDt  = document.getElementById("jobVehicle");
            var badge  = document.getElementById("filterBadge");
            if (!badge) return;
            var count = 0;
            if (cityDt && cityDt.value && cityDt.value !== "all" && cityDt.options[0] && cityDt.value !== cityDt.options[0].value) count++;
            if (vehDt  && vehDt.value  && vehDt.value  !== "all" && vehDt.options[0]  && vehDt.value  !== vehDt.options[0].value)  count++;
            badge.textContent = count;
            badge.style.display = count > 0 ? "inline-flex" : "none";
            var filterBtn = document.getElementById("filterSheetBtn");
            if (filterBtn) filterBtn.classList.toggle("has-active", count > 0);
        }
        if (btn)      btn.addEventListener("click", openSheet);
        if (overlay)  overlay.addEventListener("click", closeSheet);
        if (closeBtn) closeBtn.addEventListener("click", closeSheet);
        if (applyBtn) applyBtn.addEventListener("click", applyFilters);
        // Desktop select değişince badge'i güncelle
        ["jobCity","jobVehicle"].forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.addEventListener("change", updateFilterBadge);
        });
    })();
    </script>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/motion.js"></script>
    <script>KBApp.renderListings();</script>
</body>
</html>
