<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İş İlanları · KuryemiBul</title>
  <meta name="description" content="Kurye iş ilanlarını incele, başvur.">
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h1>İş İlanları</h1>
        <p class="page-sub">Açık kurye ilanlarını incele ve başvur.</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="text-sm text-muted" id="listingsCount"></span>
        <a href="ilan-olustur.html" class="btn btn--primary btn--sm" id="btnCreateListing" style="display:none">+ İlan Oluştur</a>
      </div>
    </div>

    <!-- Filtre çubuğu -->
    <div class="filter-bar">
      <div class="search-wrap" style="position:relative;flex:1;min-width:200px">
        <span class="search-ico" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="search" id="jobSearch" placeholder="Pozisyon, firma, şehir ara…" autocomplete="off" style="padding-left:36px">
        <div class="suggest-box" id="jobSuggest"></div>
      </div>
      <select id="jobCity"><option value="">Tüm Şehirler</option></select>
      <select id="jobVehicle"><option value="">Tüm Araçlar</option></select>
      <select id="jobSort">
        <option value="new">En Yeni</option>
        <option value="old">En Eski</option>
        <option value="match">Uyum</option>
      </select>
    </div>

    <!-- Aktif filtre chipleri -->
    <div class="active-chips" id="jobChips"></div>

    <!-- İlan grid -->
    <div class="cards-grid" id="listingsGrid">
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava" style="border-radius:6px"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--line" style="width:90%;margin-top:14px"></span><span class="skel skel--chips" style="margin-top:14px"></span></div>
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava" style="border-radius:6px"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--line" style="width:90%;margin-top:14px"></span><span class="skel skel--chips" style="margin-top:14px"></span></div>
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava" style="border-radius:6px"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--line" style="width:90%;margin-top:14px"></span><span class="skel skel--chips" style="margin-top:14px"></span></div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/prefs.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.KBApp && KBApp.renderListings) KBApp.renderListings();

      /* İlan Oluştur butonu — giriş yapmış herkese göster */
      var createBtn = document.getElementById('btnCreateListing');
      if (createBtn && window.KB) {
        KB.ready().then(function () {
          var role = KB.getRole ? KB.getRole() : '';
          if (role && role !== 'guest') createBtn.style.display = 'inline-flex';
        });
      }

      /* Tercih banner — kullanıcının tercihleri varsa filtre çubuğu üstünde göster */
      if (window.KBPrefs && KBPrefs.hasPrefs()) {
        var filterBar = document.querySelector('.filter-bar');
        if (filterBar) {
          var banner = document.createElement('div');
          banner.className = 'pref-banner';
          banner.innerHTML =
            '<span class="pref-banner__ico">⚙️</span>' +
            '<div class="pref-banner__body">' +
              '<div class="pref-banner__title">Tercihleriniz aktif</div>' +
              '<div class="pref-banner__sub">İlanlar çalışma tercihlerinize göre puanlanıyor</div>' +
            '</div>' +
            '<span class="pref-banner__btn">Uyuma Göre Sırala</span>';
          banner.addEventListener('click', function () {
            var sel = document.getElementById('jobSort');
            if (sel) { sel.value = 'match'; sel.dispatchEvent(new Event('change')); }
          });
          filterBar.parentNode.insertBefore(banner, filterBar);
        }
      }
    });
  </script>
</body>
</html>
