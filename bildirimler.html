<!DOCTYPE html>
<html lang="tr">
<head>

<body>
  <div class="bg-fx" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="orb orb--3"></span></div>
  <div id="app"></div>
  <template id="page">
    <div class="grid grid--4 reveal">
      <div class="stat"><div class="stat__top"><span class="stat__ic">🚨</span><span class="stat__l">Acil Uyarı</span></div><div class="stat__v" data-count="2">0</div><div class="stat__d down">▲ ilgi bekliyor</div></div>

          <div class="alert alert--cy"><span class="ai">📦</span><span><b>Teslimat #1042 yolda</b><span> Yusuf K. · tahmini 6 dk.</span></span><a href="teslimat.html" class="act-link">Takip et →</a></div>
          <div class="alert alert--cy"><span class="ai">🏪</span><span><b>Moda Çiçek kurye talep etti</b><span> 2 paket · Acil.</span></span><a href="eslesme.html" class="act-link">Eşleştir →</a></div>

        </div>
      </div>
      <div class="grid" style="gap:18px">
        <div class="panel">
          <div class="panel__h"><h3><span class="ic">🗂️</span> Kategoriler</h3></div>
          <div class="panel__b act">
            <div class="act__row"><span class="act__ic">🚨</span><span class="act__t"><b>Acil Uyarılar</b></span><span class="act__time"><span class="chip" style="color:#f87171;border-color:rgba(239,68,68,.4)">2</span></span></div>
            <div class="act__row"><span class="act__ic">📦</span><span class="act__t"><b>Teslimat Güncellemeleri</b></span><span class="act__time"><span class="chip chip--cy">14</span></span></div>
            <div class="act__row"><span class="act__ic">🏪</span><span class="act__t"><b>İşletme Talepleri</b></span><span class="act__time"><span class="chip chip--cy">7</span></span></div>
            <div class="act__row"><span class="act__ic">💬</span><span class="act__t"><b>Kurye Mesajları</b></span><span class="act__time"><span class="chip">5</span></span></div>

  <script src="assets/js/data.js"></script><script src="assets/js/supabase.js"></script><script src="assets/js/platform.js"></script>
  <script>
    var wrap = Platform.init({ active: 'notif', title: 'Bildirim Merkezi', subtitle: 'Modern aktivite akışı · her şey tek yerde' });
    wrap.innerHTML = document.getElementById('page').innerHTML;
    Platform.animate();
  </script>
