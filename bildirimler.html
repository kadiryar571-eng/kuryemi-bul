<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bildirimler · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .notif-list { display: flex; flex-direction: column; gap: 0; }
    .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .notif-item:last-child { border-bottom: none; }
    .notif-ico { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .notif-body { flex: 1; }
    .notif-title { font-size: 0.9rem; font-weight: 500; color: var(--text); line-height: 1.4; }
    .notif-time { font-size: 0.78rem; color: var(--text-3); margin-top: 3px; }
    .notif-item--unread .notif-title { font-weight: 600; }
    .notif-item--unread { background: #f0f4ff; border-radius: var(--radius); padding: 14px; margin: 0 -4px; }
    .notif-empty { text-align: center; padding: 64px 0; color: var(--text-2); }
    .notif-empty__ic { font-size: 2.5rem; margin-bottom: 12px; }
    .notif-empty__t { font-weight: 600; margin-bottom: 6px; }
  </style>
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1>Bildirimler</h1>
        <p class="page-sub">Teklif, başvuru ve mesaj güncellemeleri.</p>
      </div>
    </div>

    <div class="card" style="padding:24px">
      <div id="notifList">
        <div class="skel-card"><span class="skel skel--line" style="width:80%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></div>
        <div class="skel-card" style="margin-top:12px"><span class="skel skel--line" style="width:70%"></span><span class="skel skel--line" style="width:35%;margin-top:8px"></span></div>
        <div class="skel-card" style="margin-top:12px"><span class="skel skel--line" style="width:75%"></span><span class="skel skel--line" style="width:45%;margin-top:8px"></span></div>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (!window.KB) return;
      await KB.ready();
      var host = document.getElementById('notifList');
      if (!host) return;
      if (!window.SB || !SB.isOn()) {
        var mockNotifs = (window.KB_DATA && KB_DATA.bildirimler) || [];
        if (!mockNotifs.length) {
          host.innerHTML = '<div class="notif-empty"><div class="notif-empty__ic">🔔</div><div class="notif-empty__t">Bildirim bulunmuyor</div></div>';
          return;
        }
        var icoMap = { offer: '✉️', message: '💬', apply: '📋', system: '⚙️' };
        host.innerHTML = '<div class="notif-list">' + mockNotifs.map(function(n) {
          var ico = icoMap[n.type] || '🔔';
          var unread = !n.read_at;
          var dateStr = '';
          try { dateStr = n.created_at ? new Date(n.created_at).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : ''; } catch(e) {}
          return '<div class="notif-item' + (unread ? ' notif-item--unread' : '') + '"' +
            (n.link ? ' style="cursor:pointer" onclick="location.href=\'' + n.link + '\'"' : '') + '>' +
            '<div class="notif-ico">' + ico + '</div>' +
            '<div class="notif-body">' +
              '<div class="notif-title">' + (n.title ? '<strong>' + (window.KB ? KB.esc(n.title) : n.title) + '</strong> — ' : '') + (window.KB ? KB.esc(n.body || 'Yeni bildirim') : (n.body || 'Yeni bildirim')) + '</div>' +
              '<div class="notif-time">' + dateStr + '</div>' +
            '</div></div>';
        }).join('') + '</div>';
        return;
      }
      try {
        var notifs = await SB.myNotifications ? SB.myNotifications() : Promise.resolve([]);
        if (!notifs || !notifs.length) {
          host.innerHTML = '<div class="notif-empty"><div class="notif-empty__ic">🔔</div><div class="notif-empty__t">Henüz bildirim yok</div><p style="color:var(--text-2);font-size:0.85rem">Yeni teklifler ve mesajlar burada görünür.</p></div>';
          return;
        }
        host.innerHTML = '<div class="notif-list">' + notifs.map(function(n) {
          var ico = n.type === 'offer' ? '✉️' : n.type === 'message' ? '💬' : n.type === 'apply' ? '📋' : '🔔';
          var unread = !n.read_at;
          return '<div class="notif-item' + (unread ? ' notif-item--unread' : '') + '">' +
            '<div class="notif-ico">' + ico + '</div>' +
            '<div class="notif-body">' +
              '<div class="notif-title">' + (n.body || n.message || 'Yeni bildirim') + '</div>' +
              '<div class="notif-time">' + (n.created_at ? new Date(n.created_at).toLocaleDateString('tr-TR') : '') + '</div>' +
            '</div></div>';
        }).join('') + '</div>';
      } catch (e) {
        host.innerHTML = '<div class="notif-empty"><div class="notif-empty__ic">🔔</div><div class="notif-empty__t">Bildirimler yüklenemedi</div></div>';
      }
    });
  </script>
</body>
</html>
