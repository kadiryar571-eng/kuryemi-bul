<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>İşletme Kontrol Paneli · Kuryemi Bul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/landing.css"><link rel="stylesheet" href="assets/css/platform.css">
    <link rel="stylesheet" href="assets/css/space-bg.css">
</head>
<body>
  <div class="bg-fx" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="orb orb--3"></span></div>
  <div id="app"></div>
  <template id="page">
    <div class="grid grid--4 reveal">
      <div class="stat"><div class="stat__top"><span class="stat__ic">👥</span><span class="stat__l">Aktif Talep</span></div><div class="stat__v" data-count="8">0</div><div class="stat__d up">▲ 3 değerlendirmede</div></div>
      <div class="stat"><div class="stat__top"><span class="stat__ic">✅</span><span class="stat__l">Bu Ay İşe Alım</span></div><div class="stat__v" data-count="342">0</div><div class="stat__d up">▲ %12</div></div>
      <div class="stat"><div class="stat__top"><span class="stat__ic">💸</span><span class="stat__l">Bu Ay Harcama</span></div><div class="stat__v" data-prefix="₺" data-count="8640">0</div><div class="stat__d down">▼ %6 tasarruf</div></div>
      <div class="stat"><div class="stat__top"><span class="stat__ic">⭐</span><span class="stat__l">Memnuniyet</span></div><div class="stat__v" data-count="4.8" data-dec="1">0</div><div class="stat__d up">▲ stabil</div></div>
    </div>

    <div class="ops reveal" style="margin-top:18px">
      <div class="panel">
        <div class="panel__h"><h3><span class="ic">📋</span> Kurye Talepleri</h3><span class="right"><a class="act-link" style="color:var(--cyan);font-weight:600" href="ilanlar.html">Yeni ilan →</a></span></div>
        <div class="panel__b" style="padding:6px 8px">
          <table class="tbl">
            <thead><tr><th>Talep</th><th>Kurye</th><th>Durum</th><th>Tutar</th><th>Süre</th></tr></thead>
            <tbody>
              <tr><td><span class="u"><span class="av">🎯</span> #1042</span></td><td>Yusuf K.</td><td><span class="chip chip--cy">● Süreçte</span></td><td>₺48</td><td>6 dk</td></tr>
              <tr><td><span class="u"><span class="av">🎯</span> #1041</span></td><td>Elif D.</td><td><span class="chip chip--cy">● Başvuru Alındı</span></td><td>₺62</td><td>14 dk</td></tr>
              <tr><td><span class="u"><span class="av">🎯</span> #1040</span></td><td>—</td><td><span class="chip chip--warn">● Eşleşme Aranıyor</span></td><td>₺35</td><td>—</td></tr>
              <tr><td><span class="u"><span class="av">🎯</span> #1039</span></td><td>Murat A.</td><td><span class="chip chip--ok">● Tamamlandı</span></td><td>₺51</td><td>✓</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="grid" style="gap:18px">
        <div class="ai-card"><div class="ai-card__h">🧠 Akıllı İçgörü</div><p>Hafta içi yoğun dönemde <b>2 premium kuryeyi</b> önceden sabitle; ortalama karşılama süresi <b>%22 kısalır</b>.</p></div>
        <div class="panel">
          <div class="panel__h"><h3><span class="ic">⭐</span> Favori Kuryeler</h3></div>
          <div class="panel__b act">
            <div class="act__row"><span class="act__ic">🛵</span><span><span class="act__t"><b>Yusuf K.</b></span><br><span class="act__s">48 görev · 4.9★</span></span><span class="act__time"><span class="vbadge vbadge--pro">Pro</span></span></div>
            <div class="act__row"><span class="act__ic">🛵</span><span><span class="act__t"><b>Elif D.</b></span><br><span class="act__s">31 görev · 5.0★</span></span><span class="act__time"><span class="vbadge vbadge--prem">Premium</span></span></div>
            <div class="act__row"><span class="act__ic">🛵</span><span><span class="act__t"><b>Selin B.</b></span><br><span class="act__s">22 görev · 4.8★</span></span><span class="act__time"><span class="vbadge vbadge--ok">✓</span></span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid--3 reveal" style="margin-top:18px">
      <div class="panel col-2">
        <div class="panel__h"><h3><span class="ic">📈</span> Aylık İşe Alım & Harcama Trendi</h3><span class="right chip chip--ok">▲ %12</span></div>
        <div class="panel__b"><svg class="linechart" id="bizChart" aria-hidden="true"></svg></div>
      </div>
      <div class="panel">
        <div class="panel__h"><h3><span class="ic">😊</span> Müşteri Memnuniyeti</h3></div>
        <div class="panel__b" style="display:flex;flex-direction:column;align-items:center;gap:14px">
          <div class="donut" style="--p:88;--p2:96"><i><b>4.8</b><span>/ 5.0</span></i></div>
          <div class="metricrow" style="width:100%">
            <div class="metric"><div class="metric__t"><span>Hız</span><b>%94</b></div><div class="metric__track"><i data-fill="94"></i></div></div>
            <div class="metric"><div class="metric__t"><span>İletişim</span><b>%90</b></div><div class="metric__track"><i data-fill="90"></i></div></div>
            <div class="metric"><div class="metric__t"><span>Hizmet kalitesi</span><b>%97</b></div><div class="metric__track"><i data-fill="97"></i></div></div>
          </div>
        </div>
      </div>
    </div>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/data.js"></script><script src="assets/js/supabase.js"></script><script src="assets/js/platform.js"></script>
  <script>
    var wrap = Platform.init({ active: 'biz', title: 'İşletme Kontrol Paneli', subtitle: 'Kurye taleplerinizde tam görünürlük ve kontrol' });
    wrap.innerHTML = document.getElementById('page').innerHTML;
    Platform.lineChart(document.getElementById('bizChart'), [120,140,135,160,180,175,210,230,220,260,290,342]);
    Platform.animate();
  </script>
</body>
</html>
