<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.havuzum">Havuzum · Kuryemi Bul</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
</head>
<body>
    <div id="app-header"></div>

    <section class="kb-hero">
        <div class="container">
            <span class="kb-hero__eyebrow">Koleksiyonum</span>
            <h1 class="kb-hero__title">Kayıtlı <span class="grad">yeteneklerim</span></h1>
            <p class="kb-hero__sub">Profiline yıldız verdiğin kurye, işveren ve firmalar tek premium koleksiyonda.</p>
            <div class="kb-hero__meta"><span class="kb-hero__meta-item">Hızlı erişim</span><span class="kb-hero__meta-item">Kişisel havuz</span></div>
        </div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="fav-tabs" role="tablist">
                <button class="fav-tab is-active" role="tab" aria-selected="true" data-favtab="profiles" data-i18n="fav.tabProfiles">Kayıtlı Profiller</button>
                <button class="fav-tab" role="tab" aria-selected="false" data-favtab="jobs" data-i18n="fav.tabJobs">Kayıtlı İlanlar</button>
            </div>

            <section class="fav-panel is-active" id="favPanel-profiles" role="tabpanel">
                <p class="result-count" id="myPoolCount"></p>
                <div class="talent-grid" id="myPoolGrid"></div>
            </section>

            <section class="fav-panel" id="favPanel-jobs" role="tabpanel" hidden>
                <div class="toolbar">
                    <p class="result-count" id="savedJobsCount" style="margin:0"></p>
                    <select id="savedSort" class="toolbar__sort" aria-label="Sırala">
                        <option value="new" data-i18n="fav.sortNew">En yeni</option>
                        <option value="company" data-i18n="fav.sortCompany">İşverene göre</option>
                        <option value="location" data-i18n="fav.sortLocation">Konuma göre</option>
                    </select>
                </div>
                <div class="talent-grid" id="savedJobsGrid"></div>
            </section>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      KBApp.renderMyPool();
      var savedLoaded = false;
      document.querySelectorAll("[data-favtab]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var tab = btn.getAttribute("data-favtab");
          document.querySelectorAll("[data-favtab]").forEach(function (b) {
            var on = b === btn; b.classList.toggle("is-active", on); b.setAttribute("aria-selected", on ? "true" : "false");
          });
          document.getElementById("favPanel-profiles").hidden = tab !== "profiles";
          document.getElementById("favPanel-profiles").classList.toggle("is-active", tab === "profiles");
          document.getElementById("favPanel-jobs").hidden = tab !== "jobs";
          document.getElementById("favPanel-jobs").classList.toggle("is-active", tab === "jobs");
          if (tab === "jobs" && !savedLoaded) { savedLoaded = true; KBApp.renderSavedJobs(); }
        });
      });
    </script>
</body>
</html>
