<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Havuzum · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Havuzum</h1>
      <p class="page-sub">Kaydettiğiniz profiller ve ilanlar.</p>
    </div>

    <!-- Sekmeler -->
    <div class="tab-bar" id="havuzumTabs" style="margin-bottom:24px">
      <button class="tab-btn is-active" data-tab="profiller">Profiller</button>
      <button class="tab-btn" data-tab="ilanlar">İlanlar</button>
    </div>

    <!-- Profiller sekmesi -->
    <div id="tabProfiller">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <span class="text-sm text-muted" id="myPoolCount"></span>
      </div>
      <div class="cards-grid" id="myPoolGrid">
        <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
        <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
        <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
      </div>
    </div>

    <!-- İlanlar sekmesi (gizli) -->
    <div id="tabIlanlar" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <span class="text-sm text-muted" id="savedJobsCount"></span>
        <select id="savedSort" class="input" style="width:auto;padding:7px 12px;font-size:0.875rem">
          <option value="new">En yeni</option>
          <option value="company">Firmaya göre</option>
          <option value="location">Şehre göre</option>
        </select>
      </div>
      <div class="cards-grid" id="savedJobsGrid">
        <div class="skel-card" style="height:120px"></div>
        <div class="skel-card" style="height:120px"></div>
        <div class="skel-card" style="height:120px"></div>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      /* Sekme geçişi */
      var tabs = document.querySelectorAll('#havuzumTabs .tab-btn');
      var pnlProfiller = document.getElementById('tabProfiller');
      var pnlIlanlar = document.getElementById('tabIlanlar');
      var jobsLoaded = false;

      tabs.forEach(function (btn) {
        btn.addEventListener('click', function () {
          tabs.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          var tab = btn.dataset.tab;
          pnlProfiller.style.display = tab === 'profiller' ? '' : 'none';
          pnlIlanlar.style.display = tab === 'ilanlar' ? '' : 'none';
          if (tab === 'ilanlar' && !jobsLoaded) {
            jobsLoaded = true;
            if (window.KBApp && KBApp.renderSavedJobs) KBApp.renderSavedJobs();
          }
        });
      });

      /* İlk yükleme: profil havuzu */
      if (window.KBApp && KBApp.renderMyPool) KBApp.renderMyPool();
    });
  </script>
</body>
</html>
