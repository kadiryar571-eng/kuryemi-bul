<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilimi Düzenle · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .edit-grid .field--full { grid-column: 1 / -1; }
    .avatar-upload { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .avatar-upload__av { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .avatar-upload__av img { width: 100%; height: 100%; object-fit: cover; }
    .role-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .role-pill { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 2px solid var(--border); border-radius: 24px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: border-color .15s, background .15s; background: var(--surface); }
    .role-pill input { display: none; }
    .role-pill.selected { border-color: var(--primary); background: #f0f4ff; color: var(--primary); }
    @media (max-width: 600px) { .edit-grid { grid-template-columns: 1fr; } .edit-grid .field--full { grid-column: 1; } }
  </style>
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Profilimi Düzenle</h1>
      <p class="page-sub">Bilgilerinizi güncelleyin, havuzda daha iyi görünün.</p>
    </div>

    <div class="card" style="max-width:680px;padding:28px">
      <div id="editStatus"></div>

      <!-- Avatar -->
      <div class="avatar-upload">
        <div class="avatar-upload__av" id="editAv">?</div>
        <div>
          <div style="font-weight:600;font-size:0.9rem;margin-bottom:4px">Profil Fotoğrafı</div>
          <div style="font-size:0.8rem;color:var(--text-2);margin-bottom:10px">JPG veya PNG, en fazla 2MB</div>
          <label class="btn btn--ghost btn--sm" style="cursor:pointer">
            Fotoğraf Yükle
            <input type="file" id="avatarInput" accept="image/*" style="display:none">
          </label>
        </div>
      </div>

      <!-- Rol -->
      <div class="field field--full" style="margin-bottom:20px">
        <label>Rol</label>
        <div class="role-row" id="roleRow">
          <label class="role-pill" data-role="kurye"><input type="radio" name="role" value="kurye"> 🛵 Kurye</label>
          <label class="role-pill" data-role="isletme"><input type="radio" name="role" value="isletme"> 🏪 İşletme</label>
          <label class="role-pill" data-role="firma"><input type="radio" name="role" value="firma"> 🏢 Firma</label>
        </div>
      </div>

      <form id="editForm">
        <div class="edit-grid">
          <div class="field field--required">
            <label for="editAd">Ad Soyad / İşletme Adı</label>
            <input type="text" id="editAd" autocomplete="name" required>
          </div>
          <div class="field">
            <label for="editSehir">Şehir</label>
            <input type="text" id="editSehir" placeholder="İstanbul" autocomplete="off">
          </div>
          <div class="field" id="aracField">
            <label for="editArac">Araç Türü</label>
            <select id="editArac">
              <option value="">— Seçiniz —</option>
              <option>Motosiklet</option>
              <option>Bisiklet</option>
              <option>Scooter</option>
              <option>Araba</option>
              <option>Yaya</option>
              <option>Diğer</option>
            </select>
          </div>
          <div class="field" id="deneyimField">
            <label for="editDeneyim">Deneyim (Yıl)</label>
            <input type="number" id="editDeneyim" min="0" max="50" placeholder="0">
          </div>
          <div class="field" id="turField">
            <label for="editTur">İşletme Türü</label>
            <input type="text" id="editTur" placeholder="Restoran, Market, vb." autocomplete="off">
          </div>
          <div class="field" id="kapasiteField">
            <label for="editKapasite">Kurye Kapasitesi</label>
            <input type="number" id="editKapasite" min="0" max="9999" placeholder="0">
          </div>
          <div class="field field--full">
            <label for="editAciklama">Hakkında</label>
            <textarea id="editAciklama" rows="4" placeholder="Kendinizi veya işletmenizi kısaca tanıtın…"></textarea>
          </div>
        </div>

        <div style="margin-top:8px">
          <button type="submit" class="btn btn--primary" id="editSave">Kaydet</button>
          <span id="editMsg" style="margin-left:14px;font-size:0.875rem;display:none"></span>
        </div>
      </form>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
  (async function () {
    if (!window.KB) return;
    await KB.ready();

    var profile = null;
    var selectedRole = 'kurye';

    function setMsg(text, isError) {
      var el = document.getElementById('editMsg');
      el.style.display = text ? 'inline' : 'none';
      el.style.color = isError ? '#dc2626' : '#16a34a';
      el.textContent = text;
    }

    function updateRoleUI(role) {
      selectedRole = role;
      document.querySelectorAll('.role-pill').forEach(function (p) {
        p.classList.toggle('selected', p.getAttribute('data-role') === role);
        var inp = p.querySelector('input');
        if (inp) inp.checked = p.getAttribute('data-role') === role;
      });
      // Rol-özel alanlar
      var isKurye = role === 'kurye';
      var isFirma = role === 'firma';
      var isIsletme = role === 'isletme';
      document.getElementById('aracField').style.display = isKurye ? '' : 'none';
      document.getElementById('deneyimField').style.display = isKurye ? '' : 'none';
      document.getElementById('turField').style.display = isIsletme ? '' : 'none';
      document.getElementById('kapasiteField').style.display = isFirma ? '' : 'none';
    }

    // Rol pill tıklaması
    document.querySelectorAll('.role-pill').forEach(function (p) {
      p.addEventListener('click', function () { updateRoleUI(p.getAttribute('data-role')); });
    });

    // Profili yükle
    try {
      if (window.SB && SB.isOn()) {
        profile = await SB.myProfile();
      }
    } catch (e) {}

    if (profile) {
      updateRoleUI(profile.role || 'kurye');
      document.getElementById('editAd').value = profile.ad || '';
      document.getElementById('editSehir').value = profile.sehir || '';
      document.getElementById('editArac').value = profile.arac || '';
      document.getElementById('editDeneyim').value = profile.deneyim || '';
      document.getElementById('editTur').value = profile.tur || '';
      document.getElementById('editKapasite').value = profile.kapasite || '';
      document.getElementById('editAciklama').value = profile.aciklama || '';
      var av = document.getElementById('editAv');
      if (profile.avatar_url) {
        av.innerHTML = '<img src="' + profile.avatar_url + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
      } else if (window.KB && KB.initials) {
        av.textContent = KB.initials(profile.ad || '?');
      }
    } else {
      updateRoleUI('kurye');
    }

    // Avatar yükleme önizlemesi
    document.getElementById('avatarInput').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (ev) {
        document.getElementById('editAv').innerHTML = '<img src="' + ev.target.result + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
      };
      reader.readAsDataURL(file);
    });

    // Form submit
    document.getElementById('editForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('editSave');
      btn.disabled = true;
      btn.textContent = 'Kaydediliyor…';
      setMsg('', false);

      var fields = {
        role: selectedRole,
        ad: document.getElementById('editAd').value.trim(),
        sehir: document.getElementById('editSehir').value.trim(),
        arac: document.getElementById('editArac').value,
        deneyim: parseInt(document.getElementById('editDeneyim').value) || 0,
        tur: document.getElementById('editTur').value.trim(),
        kapasite: parseInt(document.getElementById('editKapasite').value) || 0,
        aciklama: document.getElementById('editAciklama').value.trim()
      };

      // Avatar dosyası
      var avatarFile = document.getElementById('avatarInput').files[0];
      if (avatarFile && window.SB && SB.uploadAvatar) {
        try { var url = await SB.uploadAvatar(avatarFile); if (url) fields.avatar_url = url; } catch (ae) {}
      }

      try {
        if (window.SB && SB.isOn()) {
          await SB.updateMyProfile(fields);
          setMsg('Profil güncellendi!', false);
        } else {
          setMsg('Çevrimdışı modda değişiklik kaydedilemez.', true);
        }
      } catch (err) {
        setMsg((err && err.message) || 'Bir hata oluştu.', true);
      }

      btn.disabled = false;
      btn.textContent = 'Kaydet';
    });
  })();
  </script>
</body>
</html>
