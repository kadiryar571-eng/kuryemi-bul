<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pe.title">Profilim · Kuryemi Bul</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <style>
      /* Rol seçici (profil tamamlamada) */
      .role-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
      .role-pick__btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;border-radius:12px;
        border:1px solid var(--line);background:var(--surface,#fff);color:var(--muted,#667);cursor:pointer;
        font-family:inherit;font-weight:600;font-size:.85rem;transition:all .2s}
      .role-pick__btn .em{font-size:1.5rem;line-height:1}
      .role-pick__btn:hover{border-color:var(--primary,#4f8bff)}
      .role-pick__btn.active{border-color:var(--primary,#4f8bff);color:var(--primary,#4f8bff);
        background:rgba(79,139,255,.08);box-shadow:0 0 0 1px var(--primary,#4f8bff) inset}
    </style>
</head>
<body>
    <div id="app-header"></div>

    <section class="page-head">
        <div class="container"><h1 data-i18n="pe.title">Profilim</h1><p data-i18n="pe.lead">Bilgilerini doldur; havuzda böyle görüneceksin.</p></div>
    </section>

    <main class="section--sm">
        <div class="container container--narrow">
            <div class="form-card">
                <form id="peForm"><p class="pcard__sub">…</p></form>
                <p class="form-success" id="peMsg" hidden></p>
                <p class="mt-24" id="peView" hidden><a class="btn btn--light btn--sm" id="peViewLink" href="#" data-i18n="pe.viewPublic">Herkese açık profilimi gör →</a></p>
            </div>

            <div class="form-card mt-24" id="kycCard" hidden>
                <h3 style="margin-bottom:6px" data-i18n="kyc.title">🪪 Kimlik Doğrulama</h3>
                <p class="pcard__sub" data-i18n="kyc.lead">Profilini doğrulat, havuzda "✓ Doğrulanmış" rozetiyle öne çık.</p>
                <div id="kycBody" class="mt-24"></div>
            </div>

            <div class="form-card mt-24" id="accCard" hidden>
                <h3 style="margin-bottom:16px" data-i18n="acc.title">Hesap</h3>
                <div class="field"><label for="accPass" data-i18n="acc.changePass">Şifre Değiştir</label>
                    <input type="password" id="accPass" minlength="6" data-i18n-ph="acc.newPass" placeholder="Yeni şifre (en az 6 karakter)"></div>
                <button type="button" id="accPassBtn" class="btn btn--light btn--sm mt-24" data-i18n="acc.changePassBtn">Şifreyi Güncelle</button>
                <p class="form-success" id="accMsg" hidden></p>

                <hr style="border:none;border-top:1px solid var(--line);margin:26px 0">
                <h4 style="color:var(--danger);margin-bottom:6px" data-i18n="acc.danger">Tehlikeli alan</h4>
                <p class="pcard__sub" data-i18n="acc.deleteDesc">Profilin, iletişim bilgilerin, tekliflerin ve havuzun kalıcı olarak silinir.</p>
                <button type="button" id="accDelBtn" class="btn btn--ghost btn--sm mt-24" data-i18n="acc.deleteData">Profil verilerimi sil</button>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    (function () {
        var t = (window.KBI18N && window.KBI18N.t) || function (k) { return k; };
        var form = document.getElementById("peForm");
        var msg = document.getElementById("peMsg");

        function field(id, label, val, type) {
            return '<div class="field"><label for="' + id + '">' + label + '</label>' +
                '<input id="' + id + '" type="' + (type || "text") + '" value="' + (val == null ? "" : String(val).replace(/"/g, "&quot;")) + '"></div>';
        }
        function area(id, label, val) {
            return '<div class="field field--full"><label for="' + id + '">' + label + '</label>' +
                '<textarea id="' + id + '" rows="2">' + (val == null ? "" : String(val)) + '</textarea></div>';
        }
        function levelSelect(val) {
            var opts = ["standart", "profesyonel", "premium"].map(function (s) {
                return '<option value="' + s + '"' + (s === val ? " selected" : "") + '>' + t("level." + s) + '</option>';
            }).join("");
            return '<div class="field"><label for="pSeviye">' + t("pe.level") + '</label><select id="pSeviye">' + opts + '</select></div>';
        }
        function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; }
        function csv(id) { return val(id).split(",").map(function (s) { return s.trim(); }).filter(Boolean); }
        function intv(id) { return parseInt(val(id), 10) || 0; }

        // Şehir/bölge -> koordinat (OpenStreetMap Nominatim, ücretsiz)
        async function geocode(q) {
            try {
                var r = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tr&accept-language=tr&q=" + encodeURIComponent(q));
                var j = await r.json();
                if (j && j[0]) return { lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon) };
            } catch (e) {}
            return null;
        }

        async function start() {
            if (window.KB && KB.ready) await KB.ready();
            if (!(window.KB && KB.isOnline())) { form.innerHTML = '<p class="empty">Supabase gerekli (demo modu).</p>'; return; }
            if (!KB.isAuthed()) { form.innerHTML = '<p class="empty">' + t("pe.loginRequired") + '</p><a class="btn btn--primary mt-24" href="giris.html">' + t("cta.signin") + '</a>'; return; }

            // Hesap kartı (şifre değiştir + verilerimi sil)
            var accCard = document.getElementById("accCard");
            if (accCard) {
                accCard.hidden = false;
                var accMsg = document.getElementById("accMsg");
                document.getElementById("accPassBtn").addEventListener("click", async function () {
                    var np = document.getElementById("accPass").value;
                    if (np.length < 6) { accMsg.hidden = false; accMsg.style.color = "#c0392b"; accMsg.textContent = t("sr.short"); return; }
                    try {
                        var r = await SB.changePassword(np);
                        if (r && r.error) throw r.error;
                        accMsg.hidden = false; accMsg.style.color = ""; accMsg.textContent = t("acc.passChanged");
                        document.getElementById("accPass").value = "";
                    } catch (e) { accMsg.hidden = false; accMsg.style.color = "#c0392b"; accMsg.textContent = e.message || t("auth.errGeneric"); }
                });
                document.getElementById("accDelBtn").addEventListener("click", async function () {
                    if (!confirm(t("acc.deleteConfirm"))) return;
                    try { await SB.deleteMyData(); alert(t("acc.deleted")); location.href = "index.html"; }
                    catch (e) { alert(e.message || t("auth.errGeneric")); }
                });
            }

            var p = (KB.session() && KB.session().profile) || await SB.myProfile();
            var role = p.role;

            // KYC kartı
            var kycCard = document.getElementById("kycCard");
            if (kycCard) {
                kycCard.hidden = false;
                var kycBody = document.getElementById("kycBody");
                var d = p.dogrulama || "none";
                if (d === "verified") {
                    kycBody.innerHTML = '<p class="form-success">✓ ' + t("kyc.verified") + '</p>';
                } else if (d === "pending") {
                    kycBody.innerHTML = '<p class="pcard__sub">⏳ ' + t("kyc.pending") + '</p>';
                } else {
                    kycBody.innerHTML =
                        (d === "rejected" ? '<p class="pcard__sub" style="color:#c0392b">' + t("kyc.rejected") + '</p>' : '') +
                        '<div class="form-grid">' +
                        '<div class="field"><label>' + t("kyc.adsoyad") + '</label><input id="kycAd"></div>' +
                        '<div class="field"><label>' + t("kyc.tc") + '</label><input id="kycTc" maxlength="11" inputmode="numeric"></div>' +
                        '<div class="field"><label>' + t("kyc.belge") + '</label><select id="kycBelge"><option value="kimlik">' + t("kyc.belgeKimlik") + '</option><option value="ehliyet">' + t("kyc.belgeEhliyet") + '</option></select></div>' +
                        '</div>' +
                        '<button type="button" class="btn btn--primary btn--sm" id="kycSubmit">' + t("kyc.submit") + '</button>' +
                        '<p class="form-success" id="kycMsg" hidden></p>';
                    document.getElementById("kycSubmit").addEventListener("click", async function () {
                        var ad = val("kycAd"), tc = val("kycTc"), belge = val("kycBelge"), msg = document.getElementById("kycMsg");
                        if (ad.length < 3) { msg.hidden = false; msg.style.color = "#c0392b"; msg.textContent = t("kyc.adReq"); return; }
                        if (!/^[0-9]{11}$/.test(tc)) { msg.hidden = false; msg.style.color = "#c0392b"; msg.textContent = t("kyc.tcReq"); return; }
                        try {
                            await SB.submitKyc({ ad_soyad: ad, tc_no: tc, belge_turu: belge });
                            msg.hidden = false; msg.style.color = ""; msg.textContent = t("kyc.submitted");
                            setTimeout(function () { location.reload(); }, 1300);
                        } catch (e) { msg.hidden = false; msg.style.color = "#c0392b"; msg.textContent = e.message || t("auth.errGeneric"); }
                    });
                }
            }
            // Kullanıcı rolünü burada seçer (Google/e-posta tüm yeni kullanıcılar için onboarding).
            var curRole = role || "kurye";

            function roleSegHtml() {
                var roles = [["kurye", "🛵", t("role.kurye")], ["isletme", "🏪", t("role.isletme")], ["firma", "🏢", t("role.firma")]];
                var btns = roles.map(function (r) {
                    return '<button type="button" data-role="' + r[0] + '" class="role-pick__btn' + (r[0] === curRole ? " active" : "") + '">' +
                        '<span class="em">' + r[1] + '</span>' + r[2] + '</button>';
                }).join("");
                return '<div class="field field--full"><label>' + t("auth.role") + '</label>' +
                    '<div class="role-pick" id="rolePick">' + btns + '</div></div>';
            }

            function fieldsHtml() {
                var html = '<div class="form-grid">';
                html += roleSegHtml();
                html += field("pAd", t("pe.name"), p.ad);
                html += field("pSehir", t("pe.city"), p.sehir);
                html += field("pTel", t("pe.phone"), p.telefon);

                if (curRole === "kurye") {
                    html += field("pArac", t("pe.vehicle"), p.arac);
                    html += field("pDeneyim", t("pe.exp"), p.deneyim, "number");
                    html += levelSelect(p.seviye);
                    html += field("pTamam", t("pe.completed"), p.tamamlanan, "number");
                    html += field("pBolge", t("pe.regions"), (p.bolgeler || []).join(", "));
                    html += field("pCert", t("pe.certs"), (p.sertifikalar || []).join(", "));
                } else if (curRole === "isletme") {
                    html += field("pTur", t("pe.type"), p.tur);
                    html += field("pBolge", t("pe.regions"), (p.bolgeler || []).join(", "));
                    html += field("pAcik", t("pe.openListing"), p.acikIlan, "number");
                    html += field("pIhtiyac", t("pe.need"), p.ihtiyac);
                } else {
                    html += field("pBolge", t("pe.regions"), (p.bolgeler || []).join(", "));
                    html += field("pKapasite", t("pe.capacity"), p.kapasite, "number");
                    html += field("pHizmet", t("pe.services"), (p.hizmetler || []).join(", "));
                }
                html += '</div>';
                html += area("pAbout", t("pe.about"), p.aciklama);
                html += '<button type="submit" class="btn btn--primary btn--lg btn--block">' + t("pe.save") + '</button>';
                return html;
            }

            function renderForm() {
                form.innerHTML = fieldsHtml();
                var rp = document.getElementById("rolePick");
                if (rp) rp.querySelectorAll("button").forEach(function (b) {
                    b.addEventListener("click", function () {
                        // Rol değişiminde ortak alanların girilmiş değerlerini koru
                        p.ad = val("pAd") || p.ad;
                        p.sehir = val("pSehir") || p.sehir;
                        p.telefon = val("pTel") || p.telefon;
                        p.aciklama = val("pAbout") || p.aciklama;
                        curRole = b.getAttribute("data-role");
                        renderForm();
                    });
                });
            }
            renderForm();

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                var f = { role: curRole, ad: val("pAd"), sehir: val("pSehir"), telefon: val("pTel"), aciklama: val("pAbout") };
                if (curRole === "kurye") {
                    f.arac = val("pArac"); f.deneyim = intv("pDeneyim"); f.seviye = val("pSeviye");
                    f.tamamlanan = intv("pTamam"); f.bolgeler = csv("pBolge"); f.sertifikalar = csv("pCert");
                } else if (curRole === "isletme") {
                    f.tur = val("pTur"); f.bolgeler = csv("pBolge"); f.acik_ilan = intv("pAcik"); f.ihtiyac = val("pIhtiyac");
                } else {
                    f.bolgeler = csv("pBolge"); f.kapasite = intv("pKapasite"); f.hizmetler = csv("pHizmet");
                }
                try {
                    // Konum: şehir (+ ilk bölge) -> koordinat; haritada görünmek için
                    if (f.sehir) {
                        var q = ((f.bolgeler && f.bolgeler[0]) ? f.bolgeler[0] + ", " : "") + f.sehir + ", Türkiye";
                        var loc = await geocode(q);
                        if (loc) {
                            f.lat = loc.lat + (Math.random() - 0.5) * 0.04; // küçük kayma: üst üste binmesin
                            f.lng = loc.lng + (Math.random() - 0.5) * 0.04;
                        }
                    }
                    var saved = await SB.updateMyProfile(f);
                    msg.hidden = false; msg.textContent = t("pe.saved");
                    var pg = KB.roleToPanel(curRole).replace("panel-", "profil-");
                    var link = document.getElementById("peViewLink");
                    link.href = pg + "?id=" + saved.id;
                    document.getElementById("peView").hidden = false;
                } catch (err) { msg.hidden = false; msg.style.color = "#c0392b"; msg.textContent = err.message || "Hata"; }
            });
        }
        start();
    })();
    </script>
</body>
</html>
