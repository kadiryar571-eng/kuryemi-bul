<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harita · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .map-wrap { position: relative; }
    #map {
      width: 100%;
      height: calc(100vh - var(--topbar-h) - 180px);
      min-height: 440px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .map-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .map-filter-lbl {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
    .map-filter-lbl:has(input:checked) {
      border-color: var(--primary);
      background: #f0f4ff;
      color: var(--primary);
    }
    .map-filter-lbl input { display: none; }
    .map-locate-btn {
      position: absolute;
      bottom: 24px;
      right: 14px;
      z-index: 5;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-2);
      transition: color .15s, border-color .15s;
    }
    .map-locate-btn:hover { color: var(--primary); border-color: var(--primary); }
    .map-locate-btn.locating { color: var(--primary); animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .map-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--text-2);
    }
    .map-legend__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Harita</h1>
      <p class="page-sub">Türkiye genelinde kurye, işletme ve firmaları haritada keşfet.</p>
    </div>

    <!-- Katman filtreleri -->
    <div class="map-filters">
      <label class="map-filter-lbl">
        <input type="checkbox" data-layer="kurye" checked>
        🛵 Kuryeler
      </label>
      <label class="map-filter-lbl">
        <input type="checkbox" data-layer="isletme" checked>
        📦 Esnaflar
      </label>
      <label class="map-filter-lbl">
        <input type="checkbox" data-layer="firma" checked>
        🏢 Kurye Firmaları
      </label>
    </div>

    <!-- Harita alanı -->
    <div class="map-wrap">
      <div id="map"></div>
      <!-- Konumum butonu -->
      <button class="map-locate-btn" id="locateBtn" title="Konumumu göster" aria-label="Konumumu göster">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="9"/>
        </svg>
      </button>
    </div>

    <!-- Açıklama -->
    <div class="map-legend">
      <span><span class="map-legend__dot" style="background:#22D3EE"></span>Kurye</span>
      <span><span class="map-legend__dot" style="background:#4f8bff"></span>Esnaf</span>
      <span><span class="map-legend__dot" style="background:#a855f7"></span>Kurye Firması</span>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>

  <!-- Google Maps API -->
  <script>
    function __gmapsReady() {
      if (window.KBApp && KBApp.initMapGoogle) KBApp.initMapGoogle();

      /* Konumum butonu */
      var btn = document.getElementById('locateBtn');
      if (!btn) return;
      var locMarker = null;
      btn.addEventListener('click', function () {
        if (!navigator.geolocation) {
          if (window.KBMotion) KBMotion.showErrorToast('Konum desteklenmiyor.');
          return;
        }
        btn.classList.add('locating');
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            btn.classList.remove('locating');
            var latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            /* Mevcut harita referansı app.js'ten erişilemez, Google Maps objesini bul */
            var mapEl = document.getElementById('map');
            if (!mapEl || !mapEl.__gmap) return;
            var map = mapEl.__gmap;
            map.setCenter(latLng);
            map.setZoom(13);
            if (locMarker) locMarker.setMap(null);
            locMarker = new google.maps.Marker({
              position: latLng,
              map: map,
              title: 'Konumunuz',
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 9,
                fillColor: '#0057FF',
                fillOpacity: 1,
                strokeColor: '#fff',
                strokeWeight: 3
              },
              zIndex: 9999
            });
            new google.maps.Circle({
              strokeColor: '#0057FF',
              strokeOpacity: 0.25,
              strokeWeight: 1,
              fillColor: '#0057FF',
              fillOpacity: 0.1,
              map: map,
              center: latLng,
              radius: pos.coords.accuracy || 200
            });
          },
          function (err) {
            btn.classList.remove('locating');
            if (window.KBMotion) KBMotion.showErrorToast('Konum alınamadı: ' + err.message);
          },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDIs6NXw-WTa5O_JPJX1cRlVOvHJfoFpjU&callback=__gmapsReady" async defer></script>
</body>
</html>
