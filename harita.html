<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title data-i18n="title.harita">Harita · Kuryemi Bul</title>
    <meta name="description" content="İş fırsatlarını, kuryeleri, işletmeleri ve firmaları senkron liste + harita üzerinde keşfet.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="Harita · Kuryemi Bul">
    <meta property="og:description" content="İş fırsatlarını ve yetenekleri haritada keşfet.">
    <meta property="og:url" content="https://kuryemibul.com/harita.html">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link id="kb-mobile-ux-css" rel="stylesheet" href="assets/css/mobile-ux.css">
    <link id="sidebar-css" rel="stylesheet" href="assets/css/sidebar.css">
    <link rel="stylesheet" href="assets/css/mobile-design-system.css">
    <link rel="stylesheet" href="assets/css/mobile-screens.css">
    <link rel="stylesheet" href="assets/css/mobile-motion.css">
    <link rel="stylesheet" href="assets/css/space-bg.css">
    <style>
      /* ===== Senkron Liste + Harita deneyimi ===== */
      .mx { position: relative; display: grid; grid-template-columns: 384px 1fr; gap: 0;
        height: calc(100vh - 150px); min-height: 520px; border: 1px solid var(--line);
        border-radius: 18px; overflow: hidden; background: var(--bg, #050505); box-shadow: 0 24px 60px -28px rgba(0,0,0,.7); }
      .mx__panel { display: flex; flex-direction: column; min-height: 0; background: var(--bg, #070809); border-right: 1px solid var(--line); }
      .mx-toolbar { padding: 14px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
      .mx-search { position: relative; }
      .mx-search input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 12px;
        padding: 11px 14px 11px 38px; color: var(--navy, #f4f6fb); font-family: inherit; font-size: .92rem; }
      .mx-search input:focus { outline: none; border-color: #4f8bff; box-shadow: 0 0 0 3px rgba(79,139,255,.16); }
      .mx-search::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: .85rem; opacity: .7; }
      .mx-chips { display: flex; flex-wrap: wrap; gap: 7px; }
      .mx-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px;
        border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--muted, #94a0b4);
        font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .2s; }
      .mx-chip__dot { width: 9px; height: 9px; border-radius: 50%; }
      .mx-chip.is-on { color: var(--navy, #f4f6fb); border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.07); }
      .mx-chip:not(.is-on) { opacity: .5; }
      .mx-count { padding: 10px 14px 0; font-size: .8rem; color: var(--muted, #94a0b4); }
      .mx-list { flex: 1; overflow-y: auto; padding: 10px 14px 16px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
      .mx__map { position: relative; min-height: 320px; }
      #map { position: absolute; inset: 0; width: 100%; height: 100%; background: #0a0c14; }

      /* liste kartı */
      .mx-card { display: flex; gap: 12px; padding: 13px; border-radius: 14px; border: 1px solid var(--line);
        background: rgba(255,255,255,.025); cursor: pointer; transition: border-color .2s, background .2s, transform .15s; }
      .mx-card:hover { border-color: rgba(79,139,255,.4); background: rgba(255,255,255,.05); }
      .mx-card.is-selected { border-color: rgba(34,211,238,.6); background: rgba(34,211,238,.07); box-shadow: 0 0 0 1px rgba(34,211,238,.4) inset; }
      .mx-card__ic { width: 42px; height: 42px; flex: none; border-radius: 12px; display: grid; place-items: center; font-size: 1.25rem;
        background: rgba(255,255,255,.05); border: 1px solid var(--line); }
      .mx-card__ic--ilan { background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.4); }
      .mx-card__ic--kurye { background: rgba(34,211,238,.14); border-color: rgba(34,211,238,.4); }
      .mx-card__ic--isletme { background: rgba(79,139,255,.14); border-color: rgba(79,139,255,.4); }
      .mx-card__ic--firma { background: rgba(168,85,247,.14); border-color: rgba(168,85,247,.4); }
      .mx-card__body { min-width: 0; flex: 1; }
      .mx-card__head { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
      .mx-card__title { font-weight: 700; font-size: .94rem; color: var(--navy, #f4f6fb); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mx-tag { font-size: .64rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; flex: none; text-transform: uppercase; letter-spacing: .03em; }
      .mx-tag--ilan { background: rgba(245,158,11,.16); color: #fbbf24; }
      .mx-tag--kurye { background: rgba(34,211,238,.16); color: #22d3ee; }
      .mx-tag--isletme { background: rgba(79,139,255,.16); color: #93c5fd; }
      .mx-tag--firma { background: rgba(168,85,247,.16); color: #d8b4fe; }
      .mx-card__sub { font-size: .8rem; color: var(--muted, #94a0b4); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mx-card__chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
      .mx-card__act { margin-top: 9px; }
      .mx-card--skel { align-items: center; cursor: default; }

      /* Google Maps InfoWindow özelleştirme */
      .gm-style-iw { border-radius: 12px !important; box-shadow: 0 8px 24px rgba(0,0,0,.15) !important; }
      .gm-style-iw-d { overflow: hidden !important; }
      .gm-ui-hover-effect { top: 4px !important; right: 4px !important; }

      /* Konumum butonu */
      .mx-locate-btn { width: 36px; height: 36px; background: #11151f; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #94a3b8; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.4); padding: 0; }
      .mx-locate-btn:hover { background: rgba(34,211,238,0.1); color: #22d3ee; border-color: rgba(34,211,238,0.3); }
      .mx-locate-btn.is-active { color: #22d3ee; border-color: rgba(34,211,238,0.5); background: rgba(34,211,238,0.07); }
      .mx-locate-btn.is-loading svg { animation: loc-spin 1s linear infinite; }
      @keyframes loc-spin { to { transform: rotate(360deg); } }
      /* Kullanıcı konumu mavi nokta */
      .mx-user-dot { width: 16px; height: 16px; background: #3b82f6; border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); position: relative; }
      .mx-user-pulse { position: absolute; inset: -8px; border-radius: 50%; background: rgba(59,130,246,0.18); animation: user-pulse 2s ease-out infinite; }
      @keyframes user-pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }

      /* mobil liste/harita geçişi (bottom sheet) */
      .mx-toggle { display: none; }
      @media (max-width: 860px) {
        .mx { grid-template-columns: 1fr; height: calc(100vh - 130px); }
        .mx__panel { position: absolute; left: 0; right: 0; bottom: 0; top: 38%; z-index: 1000;
          border-right: 0; border-top: 1px solid var(--line); border-radius: 18px 18px 0 0;
          transform: translateY(calc(100% - 64px)); transition: transform .35s cubic-bezier(.4,0,.2,1); box-shadow: 0 -16px 40px -20px rgba(0,0,0,.8); }
        .mx--listopen .mx__panel { transform: translateY(0); }
        .mx__panel::before { content: ""; position: absolute; top: 9px; left: 50%; transform: translateX(-50%); width: 40px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.25); }
        .mx-toolbar { padding-top: 22px; }
        .mx-toggle { display: inline-flex; align-items: center; gap: 8px; position: absolute; z-index: 1100; right: 16px; bottom: 16px;
          padding: 12px 20px; border-radius: 999px; border: none; background: linear-gradient(135deg,#4f8bff,#a855f7); color: #fff;
          font-family: inherit; font-weight: 700; font-size: .9rem; box-shadow: 0 12px 30px -10px rgba(124,92,255,.8); cursor: pointer; }
      }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <section class="page-head">
        <div class="container"><h1>🗺️ Fırsat & Yetenek Haritası</h1><p>Açık iş ilanlarını, kuryeleri, işletmeleri ve firmaları senkron liste + harita üzerinde keşfet.</p></div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="mx" id="mxRoot">
                <div class="mx__panel">
                    <div class="mx-toolbar">
                        <div class="mx-search"><input type="search" id="mxSearch" autocomplete="off" data-i18n-ph="mx.search" placeholder="Harita üzerinde ara…" aria-label="Ara"></div>
                        <div class="mx-chips">
                            <button type="button" class="mx-chip is-on" data-mxlayer="ilan" aria-pressed="true"><span class="mx-chip__dot" style="background:#f59e0b"></span><span data-i18n="mx.layer.ilan">İlanlar</span></button>
                            <button type="button" class="mx-chip is-on" data-mxlayer="kurye" aria-pressed="true"><span class="mx-chip__dot" style="background:#22d3ee"></span><span data-i18n="mx.layer.kurye">Kuryeler</span></button>
                            <button type="button" class="mx-chip is-on" data-mxlayer="isletme" aria-pressed="true"><span class="mx-chip__dot" style="background:#4f8bff"></span><span data-i18n="mx.layer.isletme">İşletmeler</span></button>
                            <button type="button" class="mx-chip is-on" data-mxlayer="firma" aria-pressed="true"><span class="mx-chip__dot" style="background:#a855f7"></span><span data-i18n="mx.layer.firma">Firmalar</span></button>
                        </div>
                    </div>
                    <p class="mx-count" id="mxCount"></p>
                    <div class="mx-list" id="mxList"></div>
                </div>
                <div class="mx__map"><div id="map"></div></div>
                <button type="button" class="mx-toggle" id="mxToggle" data-i18n="mx.list">Liste</button>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/motion.js"></script>
    <script>function __mxMapReady(){ KBApp.initMapExperience(); }</script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBuNp0vAdDC-NLTNHQs3XH1uEpPWnklKVg&loading=async&callback=__mxMapReady" async defer></script>
</body>
</html>
