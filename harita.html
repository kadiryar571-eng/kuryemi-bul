<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.harita">Harita · Kuryemi Bul</title>
    <meta name="description" content="Kuryeleri, işletmeleri ve firmaları harita üzerinde gör; katmanları aç/kapat.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="Harita · Kuryemi Bul">
    <meta property="og:description" content="Kuryeleri, işletmeleri ve firmaları harita üzerinde gör.">
    <meta property="og:url" content="https://kadiryar571-eng.github.io/kuryemi-bul/harita.html">
    <meta property="og:image" content="https://kadiryar571-eng.github.io/kuryemi-bul/assets/og-cover.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
</head>
<body>
    <div id="app-header"></div>

    <section class="page-head">
        <div class="container"><h1>🗺️ Fırsat & Yetenek Haritası</h1><p>Bölgesel iş fırsatlarını ve yetenekleri keşfet — kuryeleri, işverenleri ve firmaları haritada gör.</p></div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="map-wrap">
                <aside class="map-side">
                    <h3>Keşif Katmanları</h3>
                    <label class="layer-toggle"><input type="checkbox" data-layer="kurye" checked>
                        <span class="layer-dot" style="background:#22D3EE"></span> Yetenekler (Kuryeler)</label>
                    <label class="layer-toggle"><input type="checkbox" data-layer="isletme" checked>
                        <span class="layer-dot" style="background:#4f8bff"></span> İşverenler (İşletmeler)</label>
                    <label class="layer-toggle"><input type="checkbox" data-layer="firma" checked>
                        <span class="layer-dot" style="background:#a855f7"></span> Kurye Firmaları</label>
                    <p class="pcard__sub" style="margin-top:14px">Bölgesel fırsatları ve yetenekleri keşfet. İşaretçiye tıkla.</p>
                </aside>
                <div id="map"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>KBApp.initMap();</script>
</body>
</html>
