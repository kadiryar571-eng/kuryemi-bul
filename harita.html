<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.harita">Harita · Kuryemi Bul</title>
    <meta name="description" content="Kuryeleri, işletmeleri ve firmaları harita üzerinde gör; katmanları aç/kapat.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="Harita · Kuryemi Bul">
    <meta property="og:description" content="Kuryeleri, işletmeleri ve firmaları harita üzerinde gör.">
    <meta property="og:url" content="https://kuryemibul.com/harita.html">
    <meta property="og:image" content="https://kuryemibul.com/assets/og-cover.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBuNp0vAdDC-NLTNHQs3XH1uEpPWnklKVg&libraries=marker"></script>
    <style>
      .map-side { position: absolute; top: 16px; left: 16px; z-index: 10; background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.15); max-width: 220px; }
      .map-side h3 { margin: 0 0 12px; font-size: 16px; font-weight: 600; }
      .layer-toggle { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; font-size: 14px; }
      .layer-toggle input { cursor: pointer; }
      .layer-dot { width: 12px; height: 12px; border-radius: 50%; }
      .map-wrap { position: relative; height: 600px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
      #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <section class="page-head">
        <div class="container"><h1>🗺️ Fırsat & Yetenek Haritası</h1><p>Bölgesel iş fırsatlarını ve yetenekleri keşfet — kuryeleri, işverenleri ve firmaları haritada gör.</p></div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="map-wrap">
                <aside class="map-side">
                    <h3>Keşif Katmanları</h3>
                    <label class="layer-toggle"><input type="checkbox" data-layer="kurye" checked>
                        <span class="layer-dot" style="background:#22D3EE"></span> Yetenekler (Kuryeler)</label>
                    <label class="layer-toggle"><input type="checkbox" data-layer="isletme" checked>
                        <span class="layer-dot" style="background:#4f8bff"></span> İşverenler (İşletmeler)</label>
                    <label class="layer-toggle"><input type="checkbox" data-layer="firma" checked>
                        <span class="layer-dot" style="background:#a855f7"></span> Kurye Firmaları</label>
                    <p class="pcard__sub" style="margin-top:14px">Bölgesel fırsatları ve yetenekleri keşfet. İşaretçiye tıkla.</p>
                </aside>
                <div id="map"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>KBApp.initMapGoogle();</script>
</body>
</html>
