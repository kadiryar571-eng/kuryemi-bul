<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.isletmeler">İşletme Havuzu · Kuryemi Bul</title>
    <meta name="description" content="Kurye ihtiyacı olan işletmeleri keşfet; türüne göre filtrele ve teklif gönder.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="İşletme Havuzu · Kuryemi Bul">
    <meta property="og:description" content="Kurye ihtiyacı olan işletmeleri keşfet; türüne göre filtrele ve teklif gönder.">
    <meta property="og:url" content="https://kuryemibul.com/isletmeler.html">
    <meta property="og:image" content="https://kuryemibul.com/assets/og-cover.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/space-bg.css">
</head>
<body>
    <div id="app-header"></div>

    <section class="kb-hero">
        <div class="container">
            <span class="kb-hero__eyebrow">İşverenler</span>
            <h1 class="kb-hero__title">Kurye arayan <span class="grad">işverenler</span></h1>
            <p class="kb-hero__sub">Kurye ihtiyacı olan işletmeleri keşfet; iş fırsatı oluştur, başvuruları yönet.</p>
            <div class="kb-hero__meta"><span class="kb-hero__meta-item">Doğrulanmış işletmeler</span><span class="kb-hero__meta-item">Aktif ilanlar</span><span class="kb-hero__meta-item">Bölgesel keşif</span></div>
        </div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="toolbar">
                <div class="search search--suggest">
                    <input type="search" id="fSearch" autocomplete="off" placeholder="İşletme, şehir veya tür ara…" aria-label="Ara">
                    <div class="suggest" id="poolSuggest" role="listbox"></div>
                </div>
                <select id="fSelect1" aria-label="Şehir"></select>
                <select id="fSelect2" aria-label="Tür"></select>
            </div>
            <div class="active-chips" id="poolChips"></div>
            <p class="result-count" id="resultCount"></p>
            <div class="talent-grid" id="poolGrid"></div>
        </div>
    </main>

    <div id="app-footer"></div>
    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>KBApp.renderPool("isletme");</script>
</body>
</html>
