<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hesap Türü Seç · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="onboard-page">

  <header class="auth-header">
    <a class="brand" href="index.html">KuryemiBul</a>
  </header>

  <main class="onboard-body">
    <div class="onboard-box">
      <h1>Seni nasıl tanımlarsın?</h1>
      <p class="sub">Seçimine göre sana özel panel ve özellikler sunacağız. İstersen sonradan değiştirebilirsin.</p>

      <div class="role-cards" id="role-cards">
        <button class="role-card" data-role="kurye" type="button">
          <div class="role-card__ico">🛵</div>
          <div>
            <div class="role-card__name">Kurye</div>
            <div class="role-card__desc">İş ilanlarına başvurur, teklif alır</div>
          </div>
        </button>
        <button class="role-card" data-role="isletme" type="button">
          <div class="role-card__ico">🏪</div>
          <div>
            <div class="role-card__name">İşletme</div>
            <div class="role-card__desc">Kurye arar, teklif gönderir, ilan verir</div>
          </div>
        </button>
        <button class="role-card" data-role="firma" type="button">
          <div class="role-card__ico">🏢</div>
          <div>
            <div class="role-card__name">Kurye Firması</div>
            <div class="role-card__desc">Kurye yönetir, toplu hizmet verir</div>
          </div>
        </button>
      </div>

      <div style="margin-top:32px">
        <div id="onboard-alert" style="display:none" class="alert alert--error mb-16" role="alert"></div>
        <button class="btn btn--primary btn--block btn--lg" id="confirm-btn" type="button" disabled>
          Devam Et
        </button>
      </div>

      <p class="text-sm text-muted text-center mt-16">
        Rolünü profil ayarlarından istediğin zaman değiştirebilirsin.
      </p>
    </div>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
  (function () {
    'use strict';

    var selected  = null;
    var cards     = document.querySelectorAll('.role-card');
    var confirmBtn = document.getElementById('confirm-btn');
    var alertEl   = document.getElementById('onboard-alert');

    cards.forEach(function (card) {
      card.addEventListener('click', function () {
        cards.forEach(function (c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selected = card.getAttribute('data-role');
        confirmBtn.disabled = false;
        alertEl.style.display = 'none';
      });
    });

    confirmBtn.addEventListener('click', async function () {
      if (!selected) return;

      /* Offline / demo mod */
      if (!window.SB || !SB.isOn()) {
        localStorage.setItem('kb_rol', selected);
        location.href = 'panel-' + selected + '.html';
        return;
      }

      confirmBtn.classList.add('is-loading'); confirmBtn.disabled = true;

      try {
        await SB.updateMyProfile({ role: selected });
        location.href = 'panel-' + selected + '.html';
      } catch (err) {
        alertEl.textContent = (err && err.message) || 'Rol seçilemedi. Lütfen tekrar dene.';
        alertEl.style.display = '';
        confirmBtn.classList.remove('is-loading'); confirmBtn.disabled = false;
      }
    });

    /* Zaten oturumu yoksa giris'e yönlendir */
    (async function () {
      if (!window.SB || !SB.isOn()) return;
      try {
        var user = await SB.getUser();
        if (!user) { location.href = 'giris.html'; return; }
        /* Zaten rol seçilmişse direkt panele git */
        var profile = await SB.myProfile();
        if (profile && profile.role) {
          location.href = (window.KB && KB.roleToPanel ? KB.roleToPanel(profile.role) : 'panel-' + profile.role + '.html');
        }
      } catch (e) {}
    })();

  }());
  </script>
</body>
</html>
