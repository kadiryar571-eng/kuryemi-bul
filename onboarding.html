<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ob.welcome">Aramıza hoş geldin · Kuryemi Bul</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/space-bg.css">
    <style>
      /* ===== Onboarding — giris.html ile aynı premium katman ===== */
      .auth-bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 22% 12%,#0b1020,#050505 62%);overflow:hidden}
      .auth-bg .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45;animation:authFloat 20s ease-in-out infinite}
      .auth-bg .orb--1{width:540px;height:540px;background:radial-gradient(circle,#4f8bff,transparent 70%);top:-140px;left:-90px}
      .auth-bg .orb--2{width:480px;height:480px;background:radial-gradient(circle,#22d3ee,transparent 70%);bottom:-160px;right:-80px;animation-delay:-7s}
      .auth-bg .orb--3{width:420px;height:420px;background:radial-gradient(circle,#a855f7,transparent 70%);top:40%;left:45%;animation-delay:-13s}
      @keyframes authFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}
      #auth-net{position:fixed;inset:0;z-index:-1;width:100%;height:100%}

      .auth-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px clamp(18px,5vw,48px)}
      .auth-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:-.02em}
      .auth-brand img{width:34px;height:34px;border-radius:8px}
      .ob-signout{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#cdd5e3;font-family:inherit;font-weight:600;font-size:.85rem;padding:9px 18px;border-radius:999px;cursor:pointer;backdrop-filter:blur(8px);transition:all .25s}
      .ob-signout:hover{color:#fff;border-color:rgba(124,140,220,.5)}

      .ob-wrap{min-height:100vh;display:grid;place-items:center;padding:108px 18px 64px}
      .ob-card{width:100%;max-width:540px;position:relative;
        background:rgba(14,17,27,.55);backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);
        border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:clamp(26px,4vw,40px);
        box-shadow:0 40px 90px -30px rgba(79,139,255,.45),0 0 0 1px rgba(255,255,255,.04) inset}
      .ob-card::before{content:"";position:absolute;inset:-1px;border-radius:24px;padding:1px;pointer-events:none;
        background:linear-gradient(135deg,rgba(79,139,255,.5),transparent 40%,transparent 60%,rgba(168,85,247,.5));
        -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.6}

      /* ilerleme */
      .ob-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
      .ob-dots{display:flex;gap:8px}
      .ob-dots i{width:30px;height:5px;border-radius:999px;background:rgba(255,255,255,.12);transition:background .35s}
      .ob-dots i.done{background:linear-gradient(135deg,#4f8bff,#a855f7)}
      .ob-skip{background:none;border:none;color:#7c89a3;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px;transition:color .2s;border-radius:8px}
      .ob-skip:hover{color:#cdd5e3}

      .ob-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.5rem,3.6vw,1.95rem);font-weight:700;color:#fff;letter-spacing:-.03em;line-height:1.12;margin:0}
      .ob-sub{color:#94a0b4;margin:9px 0 22px;font-size:.95rem;line-height:1.5}

      /* adım geçişi */
      .ob-step{display:none;animation:obFade .35s ease}
      .ob-step.active{display:block}
      @keyframes obFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

      /* rol kartları */
      .ob-roles{display:flex;flex-direction:column;gap:12px}
      .ob-role{display:flex;align-items:center;gap:15px;text-align:left;width:100%;padding:16px 18px;border-radius:16px;
        border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#cdd5e3;cursor:pointer;font-family:inherit;transition:all .22s}
      .ob-role:hover{border-color:rgba(124,140,220,.45);background:rgba(255,255,255,.05);transform:translateY(-1px)}
      .ob-role__em{width:48px;height:48px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:1.6rem;
        background:linear-gradient(135deg,rgba(79,139,255,.18),rgba(168,85,247,.18));border:1px solid rgba(255,255,255,.1)}
      .ob-role__t{font-weight:700;color:#fff;font-size:1.02rem}
      .ob-role__d{font-size:.85rem;color:#94a0b4;margin-top:2px;line-height:1.4}
      .ob-role__tick{margin-left:auto;width:24px;height:24px;flex:none;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:grid;place-items:center;color:#fff;font-size:.8rem;opacity:0;transition:opacity .2s}
      .ob-role.active{border-color:transparent;background:linear-gradient(135deg,rgba(79,139,255,.22),rgba(168,85,247,.22));box-shadow:0 0 0 1px rgba(124,92,255,.55),0 12px 30px -14px rgba(124,92,255,.7)}
      .ob-role.active .ob-role__tick{opacity:1;border-color:transparent;background:linear-gradient(135deg,#4f8bff,#a855f7)}

      /* alanlar (giris.html stiliyle uyumlu) */
      .ob-field{margin-bottom:15px}
      .ob-field>label{display:block;font-size:.8rem;color:#94a0b4;margin-bottom:7px;font-weight:600}
      .ob-inp{position:relative;display:flex;align-items:center}
      .ob-inp .ic{position:absolute;left:13px;display:flex;color:#7c89a3;pointer-events:none}
      .ob-inp input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;
        padding:14px 14px 14px 42px;color:#fff;font-size:.97rem;font-family:inherit;transition:border-color .25s,box-shadow .25s,background .25s}
      .ob-inp input::placeholder{color:#586277}
      .ob-inp input:focus{outline:none;border-color:#4f8bff;background:rgba(79,139,255,.06);box-shadow:0 0 0 4px rgba(79,139,255,.16)}
      .ob-field.invalid .ob-inp input{border-color:rgba(239,68,68,.6);background:rgba(239,68,68,.06)}
      .field-err{display:none;margin-top:6px;font-size:.78rem;color:#fca5a5;line-height:1.35}
      .ob-field.invalid .field-err{display:block}

      /* nasıl çalışır listesi */
      .ob-list{display:flex;flex-direction:column;gap:14px;margin:4px 0 4px}
      .ob-list li{list-style:none;display:flex;gap:13px;align-items:flex-start;color:#dfe5f2;font-size:.96rem;line-height:1.5}
      .ob-list__n{width:28px;height:28px;flex:none;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:.85rem;color:#fff;background:linear-gradient(135deg,#4f8bff,#a855f7)}

      /* navigasyon butonları */
      .ob-nav{display:flex;gap:10px;margin-top:24px}
      .ob-btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;position:relative;transition:transform .2s,box-shadow .3s,filter .2s,opacity .2s}
      .ob-btn--primary{color:#fff;background:linear-gradient(135deg,#4f8bff,#a855f7);box-shadow:0 12px 32px -12px rgba(124,92,255,.75)}
      .ob-btn--primary:hover{transform:translateY(-2px);box-shadow:0 18px 44px -12px rgba(124,92,255,.95);filter:brightness(1.05)}
      .ob-btn--primary:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none;filter:none}
      .ob-btn--ghost{flex:0 0 auto;padding:15px 22px;color:#cdd5e3;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14)}
      .ob-btn--ghost:hover{color:#fff;border-color:rgba(255,255,255,.28)}
      .ob-btn.is-loading{color:transparent !important;pointer-events:none}
      .ob-btn.is-loading::after{content:"";position:absolute;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:authSpin .7s linear infinite}
      @keyframes authSpin{to{transform:rotate(360deg)}}

      .ob-msg{margin-top:14px;padding:11px 14px;border-radius:12px;font-size:.9rem;text-align:center;line-height:1.45;
        background:rgba(239,68,68,.1);color:#fecaca;border:1px solid rgba(239,68,68,.28)}

      .ob-card :focus-visible{outline:2px solid #6ea0ff;outline-offset:2px;border-radius:12px}

      @media (max-width:480px){ .ob-role__d{font-size:.8rem} }
      @media (prefers-reduced-motion:reduce){ .auth-bg .orb{animation:none} #auth-net{display:none} .ob-step{animation:none} }
    </style>
</head>
<body>
    <!-- uzay arka plan (giris.html ile aynı) -->
    <div class="auth-bg" aria-hidden="true">
      <span class="orb orb--1"></span><span class="orb orb--2"></span><span class="orb orb--3"></span>
    </div>
    <canvas id="auth-net" aria-hidden="true"></canvas>

    <header class="auth-header">
      <a href="index.html" class="auth-brand" aria-label="Kuryemi Bul">
        <img src="assets/logo.png" alt="" onerror="this.style.display='none'">Kuryemi&nbsp;Bul
      </a>
      <button type="button" class="ob-signout" id="obSignout" data-i18n="cta.signout">Çıkış</button>
    </header>

    <main class="ob-wrap">
      <div class="ob-card">
        <div class="ob-top">
          <div class="ob-dots" id="obDots" aria-hidden="true"><i class="done"></i><i></i><i></i></div>
          <button type="button" class="ob-skip" id="obSkip" data-i18n="ob.skip">Şimdilik geç</button>
        </div>

        <!-- ADIM 1: ROL -->
        <section class="ob-step active" id="step1" role="group" aria-label="Rol seçimi">
          <h1 class="ob-title" data-i18n="ob.role.title">Seni en iyi hangisi tanımlıyor?</h1>
          <p class="ob-sub" data-i18n="ob.role.lead">Rolünü seç — deneyimini buna göre kişiselleştirelim.</p>
          <div class="ob-roles" id="obRoles" role="radiogroup" aria-label="Rol"></div>
          <div class="ob-nav">
            <button type="button" class="ob-btn ob-btn--primary" id="step1Next" data-i18n="ob.next" disabled>Devam et</button>
          </div>
        </section>

        <!-- ADIM 2: TEMEL BİLGİLER -->
        <section class="ob-step" id="step2" role="group" aria-label="Temel bilgiler">
          <h1 class="ob-title" data-i18n="ob.basics.title">Seni biraz tanıyalım</h1>
          <p class="ob-sub" data-i18n="ob.basics.lead">Birkaç temel bilgi yeter — gerisini sonra profilinden tamamlarsın.</p>
          <div class="ob-field">
            <label for="obName" data-i18n="ob.basics.name">Ad Soyad / İşletme / Firma Adı</label>
            <div class="ob-inp">
              <span class="ic" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
              <input type="text" id="obName" data-i18n-ph="ob.basics.namePh" placeholder="Örn. Ahmet Yılmaz" autocomplete="name" aria-describedby="obNameErr">
            </div>
            <span class="field-err" id="obNameErr" role="alert"></span>
          </div>
          <div class="ob-field">
            <label for="obCity" data-i18n="ob.basics.city">Şehir</label>
            <div class="ob-inp">
              <span class="ic" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
              <input type="text" id="obCity" data-i18n-ph="ob.basics.cityPh" placeholder="Örn. İstanbul" autocomplete="address-level2" aria-describedby="obCityErr">
            </div>
            <span class="field-err" id="obCityErr" role="alert"></span>
          </div>
          <div class="ob-field">
            <label for="obPhone" data-i18n="ob.basics.phone">Telefon</label>
            <div class="ob-inp">
              <span class="ic" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l-2-5h4"/><path d="M5 4a16 16 0 0 0 15 15"/></svg></span>
              <input type="tel" id="obPhone" data-i18n-ph="ob.basics.phonePh" placeholder="05xx xxx xx xx" autocomplete="tel" aria-describedby="obPhoneErr">
            </div>
            <span class="field-err" id="obPhoneErr" role="alert"></span>
          </div>
          <div class="ob-nav">
            <button type="button" class="ob-btn ob-btn--ghost" data-back data-i18n="ob.back">Geri</button>
            <button type="button" class="ob-btn ob-btn--primary" id="step2Next" data-i18n="ob.next">Devam et</button>
          </div>
        </section>

        <!-- ADIM 3: NASIL ÇALIŞIR -->
        <section class="ob-step" id="step3" role="group" aria-label="Nasıl çalışır">
          <h1 class="ob-title" data-i18n="ob.how.title">Sırada ne var?</h1>
          <p class="ob-sub" data-i18n="ob.how.lead">Birkaç adımda hazırsın.</p>
          <ul class="ob-list" id="obHowList"></ul>
          <div class="ob-nav">
            <button type="button" class="ob-btn ob-btn--ghost" data-back data-i18n="ob.back">Geri</button>
            <button type="button" class="ob-btn ob-btn--primary" id="obFinish" data-i18n="ob.finish">Panele git →</button>
          </div>
        </section>

        <p class="ob-msg" id="obMsg" hidden></p>
      </div>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    (function () {
      var t = (window.KBI18N && window.KBI18N.t) || function (k) { return k; };

      /* ---- takımyıldız arka planı (giris.html ile aynı) ---- */
      (function net() {
        var c = document.getElementById("auth-net");
        if (!c || window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
        var ctx = c.getContext("2d"), w, h, pts, raf;
        function size() { w = c.width = innerWidth; h = c.height = innerHeight; build(); }
        function build() {
          var n = Math.min(70, Math.floor(w * h / 22000)); pts = [];
          for (var i = 0; i < n; i++) pts.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25 });
        }
        function draw() {
          ctx.clearRect(0, 0, w, h);
          for (var i = 0; i < pts.length; i++) {
            var p = pts[i]; p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > w) p.vx *= -1; if (p.y < 0 || p.y > h) p.vy *= -1;
            for (var j = i + 1; j < pts.length; j++) {
              var q = pts[j], dx = p.x - q.x, dy = p.y - q.y, d = Math.sqrt(dx * dx + dy * dy);
              if (d < 130) { ctx.strokeStyle = "rgba(124,140,220," + (.12 * (1 - d / 130)) + ")"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke(); }
            }
            ctx.fillStyle = "rgba(160,180,255,.55)"; ctx.beginPath(); ctx.arc(p.x, p.y, 1.4, 0, 6.28); ctx.fill();
          }
          raf = requestAnimationFrame(draw);
        }
        addEventListener("resize", size); size(); cancelAnimationFrame(raf); draw();
      })();

      /* ---- şehir/bölge -> koordinat (profil-duzenle.html deseni) ---- */
      async function geocode(q) {
        try {
          var r = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tr&accept-language=tr&q=" + encodeURIComponent(q));
          var j = await r.json();
          if (j && j[0]) return { lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon) };
        } catch (e) {}
        return null;
      }

      var msg = document.getElementById("obMsg");
      function showErr(text) { msg.hidden = false; msg.textContent = text; }
      function clearErr() { msg.hidden = true; }

      var state = { role: "kurye", ad: "", sehir: "", telefon: "", step: 1, online: false };
      var ROLES = [
        ["kurye", "🛵"], ["isletme", "🏪"], ["firma", "🏢"]
      ];

      /* ---- adım gösterimi ---- */
      function showStep(n) {
        state.step = n;
        ["step1", "step2", "step3"].forEach(function (id, i) {
          document.getElementById(id).classList.toggle("active", (i + 1) === n);
        });
        var dots = document.getElementById("obDots").children;
        for (var i = 0; i < dots.length; i++) dots[i].classList.toggle("done", i < n);
        clearErr();
        var firstInput = document.querySelector(".ob-step.active input");
        if (firstInput) setTimeout(function () { firstInput.focus(); }, 60);
      }

      /* ---- ADIM 1: rol kartları ---- */
      function renderRoles() {
        var host = document.getElementById("obRoles");
        host.innerHTML = ROLES.map(function (r) {
          return '<button type="button" class="ob-role" role="radio" aria-checked="false" data-role="' + r[0] + '">' +
            '<span class="ob-role__em" aria-hidden="true">' + r[1] + '</span>' +
            '<span><span class="ob-role__t">' + t("ob.role." + r[0] + ".t") + '</span>' +
            '<span class="ob-role__d">' + t("ob.role." + r[0] + ".d") + '</span></span>' +
            '<span class="ob-role__tick" aria-hidden="true">✓</span>' +
            '</button>';
        }).join("");
        host.querySelectorAll(".ob-role").forEach(function (b) {
          b.addEventListener("click", function () {
            state.role = b.getAttribute("data-role");
            host.querySelectorAll(".ob-role").forEach(function (x) {
              var on = x === b;
              x.classList.toggle("active", on);
              x.setAttribute("aria-checked", on ? "true" : "false");
            });
            document.getElementById("step1Next").disabled = false;
          });
        });
      }

      /* ---- ADIM 2: validasyon ---- */
      function fieldErr(id, text) {
        var f = document.getElementById(id).closest(".ob-field");
        f.classList.toggle("invalid", !!text);
        var e = document.getElementById(id + "Err"); if (e) e.textContent = text || "";
        return !text;
      }
      ["obName", "obCity", "obPhone"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", function () { fieldErr(id, ""); });
      });
      if (window.KB && KB.bindDraft) KB.bindDraft(document.getElementById("step2"), "ob_basics");
      function validateBasics() {
        var ok = true;
        var ad = document.getElementById("obName").value.trim();
        var city = document.getElementById("obCity").value.trim();
        var tel = document.getElementById("obPhone").value.trim();
        if (!ad) ok = fieldErr("obName", t("ob.errName")) && ok;
        if (!city) ok = fieldErr("obCity", t("ob.errCity")) && ok;
        if (tel && !/^0?5\d{9}$/.test(tel.replace(/\D/g, ""))) ok = fieldErr("obPhone", t("auth.invalidPhone")) && ok;
        if (ok) { state.ad = ad; state.sehir = city; state.telefon = tel; }
        return ok;
      }

      /* ---- ADIM 3: role göre "nasıl çalışır" ---- */
      function renderHow() {
        var host = document.getElementById("obHowList");
        host.innerHTML = [1, 2, 3].map(function (i) {
          return '<li><span class="ob-list__n" aria-hidden="true">' + i + '</span><span>' + t("ob.how." + state.role + "." + i) + '</span></li>';
        }).join("");
      }

      /* ---- kaydet (Supabase) ---- */
      async function save() {
        if (window.KB) KB.setRole(state.role);
        if (!state.online) return true; // demo modu: yalnız yerel rol
        var fields = { role: state.role, ad: state.ad, sehir: state.sehir, telefon: state.telefon };
        if (state.sehir) {
          var loc = await geocode(state.sehir + ", Türkiye");
          if (loc) { fields.lat = loc.lat + (Math.random() - 0.5) * 0.04; fields.lng = loc.lng + (Math.random() - 0.5) * 0.04; }
        }
        await SB.updateMyProfile(fields);
        return true;
      }
      function dest() { return (window.KB ? KB.roleToPanel(state.role) : "panel-kurye.html"); }

      /* ---- buton loading ---- */
      function load(btn, on) { if (btn) { btn.classList.toggle("is-loading", on); btn.disabled = on; } }

      /* ---- olaylar ---- */
      document.getElementById("step1Next").addEventListener("click", function () { showStep(2); });
      document.querySelectorAll("[data-back]").forEach(function (b) {
        b.addEventListener("click", function () { showStep(state.step - 1); });
      });
      document.getElementById("step2Next").addEventListener("click", async function () {
        if (!validateBasics()) { var f = document.querySelector(".ob-field.invalid input"); if (f) f.focus(); return; }
        var btn = this; load(btn, true);
        try { await save(); renderHow(); showStep(3); }
        catch (e) { showErr(e.message || t("auth.errGeneric")); }
        finally { load(btn, false); }
      });
      document.getElementById("obFinish").addEventListener("click", async function () {
        var btn = this; load(btn, true);
        try { await save(); if (window.KB && KB.clearDraft) KB.clearDraft("ob_basics"); location.href = dest(); }
        catch (e) { showErr(e.message || t("auth.errGeneric")); load(btn, false); }
      });
      document.getElementById("obSkip").addEventListener("click", async function () {
        // Şu ana kadar girilenleri kaydet, panele geç (boş alanlar atlanır)
        if (state.step >= 2) { var ad = document.getElementById("obName").value.trim(); var city = document.getElementById("obCity").value.trim(); var tel = document.getElementById("obPhone").value.trim(); if (ad) state.ad = ad; if (city) state.sehir = city; if (tel) state.telefon = tel; }
        var btn = this;
        try { btn.disabled = true; await save(); if (window.KB && KB.clearDraft) KB.clearDraft("ob_basics"); location.href = dest(); }
        catch (e) { showErr(e.message || t("auth.errGeneric")); btn.disabled = false; }
      });
      document.getElementById("obSignout").addEventListener("click", async function () {
        try { if (window.SB && SB.isOn()) await SB.signOut(); } catch (e) {}
        location.href = "index.html";
      });

      /* ---- başlat ---- */
      (async function start() {
        renderRoles();
        if (window.KB && KB.ready) await KB.ready();
        state.online = !!(window.KB && KB.isOnline());
        if (state.online && !(window.KB && KB.isAuthed())) { location.href = "giris.html"; return; }
        // mevcut profili ön-doldur
        var p = null;
        try { p = (window.KB && KB.session && KB.session().profile) || (state.online ? await SB.myProfile() : null); } catch (e) {}
        if (p) {
          if (p.role) {
            state.role = p.role;
            var sel = document.querySelector('.ob-role[data-role="' + p.role + '"]');
            if (sel) { sel.click(); }
          }
          if (p.ad) document.getElementById("obName").value = p.ad;
          if (p.sehir) document.getElementById("obCity").value = p.sehir;
          if (p.telefon) document.getElementById("obPhone").value = p.telefon;
        }
      })();
    })();
    </script>
</body>
</html>
