<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesajlar · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div class="page-header">
      <h1>Mesajlar</h1>
      <p class="page-sub">Bağlantılarınızla özel mesajlaşın.</p>
    </div>

    <!-- renderMessages() bu 3 elementi bekliyor -->
    <div class="msg-wrap">
      <div class="msg" id="msgRoot">

        <!-- Sol panel: arama + konuşma listesi -->
        <div class="msg__sidebar">
          <div class="msg__search">
            <input type="search" id="msgSearchInput" placeholder="Konuşmalarda ara…" autocomplete="off">
          </div>
          <div class="msg__convlist" id="msgConvList">
            <!-- Skeleton yükleyici -->
            <div class="msg-conv" style="pointer-events:none">
              <span class="skel" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></span>
              <div style="flex:1"><span class="skel skel--line" style="width:60%"></span><span class="skel skel--line" style="width:80%;margin-top:6px;display:block"></span></div>
            </div>
            <div class="msg-conv" style="pointer-events:none">
              <span class="skel" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></span>
              <div style="flex:1"><span class="skel skel--line" style="width:55%"></span><span class="skel skel--line" style="width:75%;margin-top:6px;display:block"></span></div>
            </div>
            <div class="msg-conv" style="pointer-events:none">
              <span class="skel" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></span>
              <div style="flex:1"><span class="skel skel--line" style="width:65%"></span><span class="skel skel--line" style="width:50%;margin-top:6px;display:block"></span></div>
            </div>
          </div>
        </div>

        <!-- Sağ panel: aktif sohbet -->
        <div class="msg__main" id="msgMain">
          <div class="msg-empty">
            <div class="kb-empty__ic">💬</div>
            <div class="kb-empty__t">Bir konuşma seçin</div>
            <div class="kb-empty__d">Soldaki listeden mesajlaşmak istediğiniz kişiyi seçin.</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.KBApp && KBApp.renderMessages) KBApp.renderMessages();
    });
  </script>
</body>
</html>
