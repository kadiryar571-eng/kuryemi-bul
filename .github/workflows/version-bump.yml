name: Versiyon Güncelle

on:
  push:
    branches: [main]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build numarasını artır
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('./version.json', 'utf8'));
            v.build = (v.build || 0) + 1;
            v.date = new Date().toISOString().slice(0, 10);
            fs.writeFileSync('./version.json', JSON.stringify(v, null, 2) + '\n');
            console.log('v' + v.version + '.' + v.build + ' (' + v.date + ')');
          "

      - name: Commit ve push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          VER=$(node -e "process.stdout.write(require('./version.json').version)")
          BLD=$(node -e "process.stdout.write(String(require('./version.json').build))")
          git diff --staged --quiet || git commit -m "chore: v${VER}.${BLD} [skip ci]"
          git push
