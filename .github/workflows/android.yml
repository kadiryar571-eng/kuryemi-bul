name: Android APK Derle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Java (JDK 17) kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK yolunu ayarla
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Build tools / platform yükle
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platform-tools" || true

      - name: Bağımlılıkları yükle
        run: npm install

      - name: Web varlıklarını + plugin'leri senkronla
        run: npx cap sync android

      - name: gradlew çalıştırılabilir yap
        run: chmod +x android/gradlew

      - name: APK derle (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK'yı artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: kuryemibul-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Web sitesindeki indirme dosyasını güncelle
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk downloads/kuryemibul.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/kuryemibul.apk
          git diff --staged --quiet || git commit -m "chore: APK güncelle (otomatik) [skip ci]"
          git checkout -- .
          git pull --rebase origin main
          git push
