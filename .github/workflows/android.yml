name: Android APK Derle

# Elle tetiklenir (Actions sekmesi → "Run workflow"). İçerik değişiklikleri
# canlı siteden geldiği için APK'yı yalnız kabuk değişince yeniden derlemek yeterli.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Java (JDK 17) kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Bağımlılıkları yükle
        run: npm install

      - name: Android platformunu ekle
        run: npx cap add android

      - name: Web varlıklarını senkronla
        run: npx cap sync android

      - name: gradlew çalıştırılabilir yap
        run: chmod +x android/gradlew

      - name: APK derle (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK'yı yükle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: kuryemibul-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
