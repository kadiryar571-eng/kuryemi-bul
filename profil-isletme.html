<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşletme Profili · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div id="profileRoot">
      <div class="prf">
        <div class="prf__cover"></div>
        <div class="prf__head">
          <div class="prf__av"><span class="skel" style="width:96px;height:96px;border-radius:50%;display:block"></span></div>
          <div class="prf__meta">
            <span class="skel skel--line" style="width:160px;display:block"></span>
            <span class="skel skel--line" style="width:100px;margin-top:10px;display:block"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.KBApp && KBApp.renderProfile) KBApp.renderProfile('isletme');
    });
  </script>
</body>
</html>
