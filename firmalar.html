<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurye Firmaları · KuryemiBul</title>
  <meta name="description" content="Toplu kurye hizmeti veren firmaları bul.">
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">

    <div class="page-header">
      <div>
        <h1>Kurye Firmaları</h1>
        <p class="page-sub">Toplu kurye hizmeti veren firmaları keşfet.</p>
      </div>
      <div style="display:flex;gap:8px">
        <a href="harita.html?type=firma" class="btn btn--ghost btn--sm">🗺 Haritada Gör</a>
        <button class="btn btn--ghost btn--sm" id="btnToggleView">⊟ Liste</button>
      </div>
    </div>

    <!-- Stats banner -->
    <div style="display:flex;gap:16px;padding:10px 16px;background:var(--primary-light);border-radius:var(--radius);margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <span style="font-size:0.82rem;color:var(--primary);font-weight:600">✓ <span id="psBanner">Yükleniyor…</span></span>
      <span style="font-size:0.78rem;color:var(--text-3);margin-left:auto">Kapasiteye ve değerlendirmeye göre sıralanır</span>
    </div>

    <div class="filter-bar">
      <div class="search-wrap" style="position:relative;flex:1;min-width:180px">
        <span class="search-ico" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="search" id="fSearch" placeholder="Firma adı, bölge ara…" autocomplete="off" style="padding-left:36px">
        <div class="suggest-box" id="poolSuggest"></div>
      </div>
      <select id="fSelect1"><option value="">Tüm Bölgeler</option></select>
      <select id="fSelect2" style="display:none"></select>
      <select id="fCapacity" onchange="filterByCapacity(this.value)" style="min-width:140px">
        <option value="">Tüm Kapasiteler</option>
        <option value="small">1–10 Kurye</option>
        <option value="medium">11–50 Kurye</option>
        <option value="large">50+ Kurye</option>
      </select>
      <select id="fSort" onchange="sortPool(this.value)" style="min-width:130px">
        <option value="match">Match Skoru</option>
        <option value="rating">En Yüksek Puan</option>
        <option value="capacity">Kapasite</option>
      </select>
    </div>

    <div class="active-chips" id="poolChips"></div>
    <p class="text-sm text-muted mb-16" id="resultCount"></p>

    <div class="cards-grid" id="poolGrid">
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
      <div class="skel-card"><div class="skel-card__top"><span class="skel skel--ava"></span><span style="flex:1"><span class="skel skel--line" style="width:62%"></span><span class="skel skel--line" style="width:40%;margin-top:8px"></span></span></div><span class="skel skel--chips" style="margin-top:14px"></span></div>
    </div>

  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
  (function () {
    var isListView = false;
    var capFilter  = '';
    var toggleBtn  = document.getElementById('btnToggleView');

    if (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        isListView = !isListView;
        var grid = document.getElementById('poolGrid');
        if (grid) grid.classList.toggle('cards-grid--list', isListView);
        toggleBtn.textContent = isListView ? '⊞ Grid' : '⊟ Liste';
        try { localStorage.setItem('kb_pool_view_firma', isListView ? 'list' : 'grid'); } catch (e) {}
      });
      try { if (localStorage.getItem('kb_pool_view_firma') === 'list') toggleBtn.click(); } catch (e) {}
    }

    window.filterByCapacity = function (val) {
      capFilter = val;
      document.querySelectorAll('#poolGrid .talent-card').forEach(function (c) {
        if (!val) { c.style.display = ''; return; }
        var numMatch = (c.textContent.match(/(\d+)\s*kurye/i) || [])[1];
        var n = numMatch ? parseInt(numMatch) : 0;
        var show = (val === 'small' && n >= 1  && n <= 10)
                || (val === 'medium' && n >= 11 && n <= 50)
                || (val === 'large'  && n > 50);
        c.style.display = show ? '' : 'none';
      });
    };

    window.sortPool = function (mode) {
      var cards = Array.from(document.querySelectorAll('#poolGrid .talent-card'));
      cards.sort(function (a, b) {
        if (mode === 'match') {
          var sa = parseInt((a.querySelector('.match-score') || {}).textContent || '0');
          var sb = parseInt((b.querySelector('.match-score') || {}).textContent || '0');
          return sb - sa;
        }
        if (mode === 'capacity') {
          var na = parseInt(((a.textContent.match(/(\d+)\s*kurye/i) || [])[1]) || 0);
          var nb = parseInt(((b.textContent.match(/(\d+)\s*kurye/i) || [])[1]) || 0);
          return nb - na;
        }
        return 0;
      });
      var grid = document.getElementById('poolGrid');
      if (grid) cards.forEach(function (c) { grid.appendChild(c); });
    };

    document.addEventListener('DOMContentLoaded', function () {
      if (window.KBApp && KBApp.renderPool) {
        KBApp.renderPool('firma').then(function () {
          var countEl = document.getElementById('resultCount');
          var banner  = document.getElementById('psBanner');
          if (banner && countEl) banner.textContent = countEl.textContent;
        });
      }
    });
  })();
  </script>
</body>
</html>
