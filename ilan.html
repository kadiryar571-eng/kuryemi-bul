<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İlan Detayı · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="sidebar-overlay"></div>
  <nav id="app-sidebar"></nav>

  <div class="app-content">
    <div id="jobDetailRoot">
      <!-- skeleton: JS yüklenene kadar -->
      <span class="skel skel--line" style="width:120px;display:block;margin-bottom:20px"></span>
      <div class="jd">
        <div class="jd-main">
          <div class="jd-head">
            <span class="skel skel--line" style="width:40%"></span>
            <span class="skel skel--line" style="width:70%;height:28px;margin-top:14px;display:block"></span>
            <span class="skel skel--line" style="width:55%;margin-top:12px;display:block"></span>
          </div>
          <div class="jd-section">
            <span class="skel skel--line" style="width:90%"></span>
            <span class="skel skel--line" style="width:82%;margin-top:10px;display:block"></span>
            <span class="skel skel--line" style="width:87%;margin-top:10px;display:block"></span>
          </div>
        </div>
        <aside class="jd-side">
          <div class="skel-card" style="height:120px"></div>
        </aside>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/prefs.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var id = new URLSearchParams(location.search).get('id') || '';

      /* localStorage preview for jobs created via ilan-olustur.html */
      if (id && id.indexOf('ilan_') === 0) {
        var uid = 'demo';
        try { if (window.KB && KB.session) { var s = KB.session(); if (s && s.user && s.user.id) uid = s.user.id; } } catch(e) {}
        var jobs = [];
        try { jobs = JSON.parse(localStorage.getItem('kb_my_ilanlar_' + uid)) || []; } catch(e) {}
        var job = null;
        for (var i = 0; i < jobs.length; i++) { if (jobs[i].id === id) { job = jobs[i]; break; } }
        if (job && window.KBApp && KBApp.buildJobDetailHtml) {
          var root = document.getElementById('jobDetailRoot');
          if (root) {
            var r = KBApp.buildJobDetailHtml(job, { owner: true, applied: false, saved: false, myProfile: null });
            root.innerHTML =
              '<a class="jd-back" href="ilan-olustur.html?edit=' + job.id + '">← İlanı Düzenle</a>' +
              '<div style="background:#EFF6FF;border:1px solid rgba(0,87,255,.2);border-radius:8px;padding:10px 16px;font-size:0.82rem;color:#0057FF;margin-bottom:16px">' +
                '✏️ Bu ilan sizin tarafınızdan oluşturuldu. ' +
                '<a href="ilan-olustur.html?edit=' + job.id + '" style="font-weight:600;color:#0057FF">Düzenle →</a>' +
              '</div>' +
              r.html;
            document.title = r.title;
          }
          return;
        }
      }

      if (window.KBApp && KBApp.renderJobDetail) KBApp.renderJobDetail();
    });
  </script>
</body>
</html>
