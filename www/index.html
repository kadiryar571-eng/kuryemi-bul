<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kuryemi Bul</title>
  <style>
    html,body{margin:0;height:100%;background:#050505;color:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;padding:24px}
    .logo{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;background:linear-gradient(120deg,#22d3ee,#4f8bff 45%,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .spin{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:#4f8bff;animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    .sub{font-size:.9rem;color:#94a0b4}
    .retry{display:none;margin-top:8px;padding:11px 22px;border-radius:999px;border:none;background:linear-gradient(135deg,#4f8bff,#a855f7);color:#fff;font:inherit;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🛵 Kuryemi&nbsp;Bul</div>
    <div class="spin" id="spin"></div>
    <div class="sub" id="sub">Yükleniyor…</div>
    <button class="retry" id="retry" onclick="location.href='https://kuryemibul.com'">Tekrar dene</button>
  </div>
  <script>
    // server.url canlı siteyi yükler; bu ekran yalnız ilk açılışta ya da bağlantı yokken görünür.
    setTimeout(function () {
      if (!navigator.onLine) {
        document.getElementById('spin').style.display = 'none';
        document.getElementById('sub').textContent = 'İnternet bağlantısı yok.';
        document.getElementById('retry').style.display = 'inline-block';
      }
    }, 4000);
  </script>
</body>
</html>
