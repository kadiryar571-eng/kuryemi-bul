<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563EB">
  <title>KuryemiBul</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-logo">
      <img src="assets/logo.png" alt="KuryemiBul" width="72" height="72" onerror="this.style.display='none'">
    </div>
    <div class="splash-brand">KuryemiBul</div>
    <div class="splash-sub">Doğru kurye, doğru firma, doğru eşleşme.</div>
  </div>

  <div id="kb-layout" class="kb-layout" style="display:none">
    <header id="kb-appbar" class="kb-appbar" style="display:none"></header>
    <main id="kb-screen" class="kb-screen"></main>
    <nav id="kb-bottomnav" class="kb-bottomnav" style="display:none"></nav>
  </div>

  <script>window._spmMapsReady=false;</script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDIs6NXw-WTa5O_JPJX1cRlVOvHJfoFpjU&libraries=visualization&callback=__spmMapsReady" async defer></script>
  <script>function __spmMapsReady(){window._spmMapsReady=true;if(window.initPremiumMap&&window._spmPendingRole){var r=window._spmPendingRole;window._spmPendingRole=null;setTimeout(function(){window.initPremiumMap(r);},200);}}</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/screens/shared.js"></script>
  <script src="assets/js/screens/login.js"></script>
  <script src="assets/js/screens/kurye.js"></script>
  <script src="assets/js/screens/firma.js"></script>
  <script src="assets/js/screens/isletme.js"></script>
  <script src="assets/js/screens/admin.js"></script>
  <script src="assets/js/native.js"></script>
  <script src="assets/js/webrtc.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
