<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.panelKurye">Kurye Paneli · Kuryemi Bul</title>
    <meta name="description" content="Kurye paneli: başvurular, gelen teklifler ve profil.">
    <link rel="icon" href="assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kuryemi Bul">
    <meta property="og:title" content="Kurye Paneli · Kuryemi Bul">
    <meta property="og:description" content="Kurye paneli: başvurular, gelen teklifler ve profil.">
    <meta property="og:url" content="https://kadiryar571-eng.github.io/kuryemi-bul/panel-kurye.html">
    <meta property="og:image" content="https://kadiryar571-eng.github.io/kuryemi-bul/assets/og-cover.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/talent.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBuNp0vAdDC-NLTNHQs3XH1uEpPWnklKVg&libraries=marker"></script>
</head>
<body>
    <div id="app-header"></div>

    <section class="page-head">
        <div class="container"><h1>🎯 Kariyer Merkezim</h1><p>Başvurularım, gelen teklifler ve kariyer ilerleme durumum.</p></div>
    </section>

    <main class="section--sm">
        <div class="container">
            <div class="dash">
                <nav class="dash__nav">
                    <button data-tab="ozet" class="is-active">🎯 Kariyer Skorum</button>
                    <button data-tab="harita">🗺️ Bölge Haritası</button>
                    <button data-tab="basvuru">📩 Başvurularım</button>
                    <button data-tab="teklif">💼 İş Teklifleri</button>
                    <button data-tab="profil">🪪 Kimliğim</button>
                </nav>
                <div>
                    <section id="panel-ozet" class="dash__panel is-active">
                        <div class="metric-row" id="kuryeMetrics"></div>
                        <div class="panel-box"><h3 data-i18n="panel.welcome.t">👋 Hoş geldin!</h3><p class="pcard__sub" data-i18n="panel.welcome.d">Buradan başvurularını ve sana gelen teklifleri yönetebilirsin.</p></div>
                    </section>
                    <section id="panel-harita" class="dash__panel">
                        <div id="panelMapKurye" style="width:100%;height:600px;border-radius:12px"></div>
                    </section>
                    <section id="panel-basvuru" class="dash__panel">
                        <div class="panel-box"><h3 data-i18n="box.myApplications">📨 Başvurularım</h3><div id="kuryeBasvuru"></div></div>
                    </section>
                    <section id="panel-teklif" class="dash__panel">
                        <div class="panel-box"><h3 data-i18n="box.incomingOffers">✉️ Gelen Teklifler</h3><div id="kuryeTeklif"></div></div>
                    </section>
                    <section id="panel-profil" class="dash__panel">
                        <div class="panel-box"><h3 data-i18n="box.myProfile">👤 Profilim</h3>
                            <p class="pcard__sub" data-i18n="panel.myProfile.d">Örnek profilin nasıl göründüğünü incele:</p>
                            <a class="btn btn--primary mt-24" href="profil-kurye.html?id=k1" data-i18n="btn.viewMyProfile">Genel Profilimi Gör →</a>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>
    <script src="assets/js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>KBApp.initPanel("kurye");</script>
</body>
</html>
