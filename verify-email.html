<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-posta Doğrulama · KuryemiBul</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="auth-page">

  <header class="auth-header">
    <a class="brand" href="index.html">KuryemiBul</a>
  </header>

  <main class="auth-body">
    <div class="auth-box" style="text-align:center">
      <div style="font-size:3rem;margin-bottom:16px">📧</div>
      <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:8px">E-postanı doğrula</h1>
      <p style="color:var(--text-2);margin-bottom:24px">
        <span id="email-text">E-posta adresine</span> bir doğrulama bağlantısı gönderdik.
        Gelen kutunu kontrol et ve bağlantıya tıkla.
      </p>
      <div class="alert alert--info" style="text-align:left;margin-bottom:24px">
        <strong>Görmüyor musun?</strong> Spam / önemsiz klasörüne bakabilirsin.
        Birkaç dakika beklemeyi de dene.
      </div>
      <button class="btn btn--secondary btn--block" id="resend-btn" type="button">
        Tekrar gönder
      </button>
      <p class="auth-footer mt-16">
        <a href="giris.html">← Giriş sayfasına dön</a>
      </p>
    </div>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/motion.js"></script>
  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    var email  = params.get('email');
    if (email) {
      var el = document.getElementById('email-text');
      if (el) el.innerHTML = '<strong>' + email + '</strong> adresine';
    }

    var resendBtn = document.getElementById('resend-btn');
    var cooldown  = false;

    resendBtn.addEventListener('click', async function () {
      if (cooldown) return;
      if (!email) { KBMotion.showToast('E-posta adresi bilinmiyor.', 'error'); return; }
      if (!window.SB || !SB.isOn()) { KBMotion.showToast('Sunucuya bağlanılamadı.', 'error'); return; }
      resendBtn.disabled = true; resendBtn.textContent = 'Gönderiliyor…';
      try {
        await SB.resendVerification(email);
        KBMotion.showToast('Doğrulama e-postası tekrar gönderildi.', 'success');
        cooldown = true;
        setTimeout(function () {
          cooldown = false; resendBtn.disabled = false; resendBtn.textContent = 'Tekrar gönder';
        }, 60000);
        resendBtn.textContent = '60 saniye bekle';
      } catch (e) {
        KBMotion.showToast((e && e.message) || 'Hata oluştu.', 'error');
        resendBtn.disabled = false; resendBtn.textContent = 'Tekrar gönder';
      }
    });

    /* Zaten oturum açık mı kontrol et */
    (async function () {
      if (!window.SB || !SB.isOn()) return;
      try {
        var user = await SB.getUser();
        if (user) {
          var profile = await SB.myProfile();
          var role = profile && profile.role;
          if (role) location.href = (window.KB && KB.roleToPanel ? KB.roleToPanel(role) : 'panel-' + role + '.html');
          else location.href = 'onboarding.html';
        }
      } catch (e) {}
    })();
  }());
  </script>
</body>
</html>
